key: "WATER_CONSUMPTION"
userBetterIs: "LOWER"
impactBetterIs: "LOWER"
faIcon: "mdi-water"
name:
  default: "Water consumption per cycle"
  fr: "Consommation d'eau par cycle"
suffix:
  default: "L/cycle"
  fr: "L/cycle"
filteringType: "NUMERIC"
asScore: true
scoring:
  scale:
    min: 0.0
    max: 5.0
  normalization:
    method: "SIGMA"
    params:
      sigmaK: 2.0
  missingValuePolicy: "NEUTRAL"
  degenerateDistributionPolicy: "FALLBACK"
scoreTitle:
  fr: "Consommation d'eau"
scoreDescription:
  fr: "La consommation d'eau par cycle de lavage"
scoreUtility:
  fr: "Mesure la quantité d'eau consommée par cycle, une ressource naturelle précieuse dont la préservation réduit la pression sur les écosystèmes."
  en: "Measures water used per wash cycle, a precious natural resource whose conservation reduces pressure on ecosystems."
participateInScores:
  - WATER_CONSUMPTION
participateInACV:
  - USE
synonyms:
  all:
    - "WATERCONS"
    - "WATER CONSUMPTION"
    - "WATER CONSUMPTION PER CYCLE"
    - "CONSOMMATION D'EAU"
    - "CONSOMMATION D'EAU PAR CYCLE"
parser:
  normalize: true
  trim: true
  lowerCase: false
  upperCase: true
  removeParenthesis: false
  deleteTokens:
    - "L"
    - "LITRE"
    - "LITRES"
    - "L/CYCLE"
    - "L PAR CYCLE"
    - "CYCLE"
