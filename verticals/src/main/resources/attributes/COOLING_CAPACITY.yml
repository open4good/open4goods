key: "COOLING_CAPACITY"
faIcon: "mdi-snowflake"
name:
  default: "Cooling capacity"
  fr: "Puissance frigorifique"
suffix:
  default: "kW"
  fr: "kW"
filteringType: "NUMERIC"
asScore: false

referentials:
  icecat:
    - featureId: 2599
      name: "Cooling capacity"
  eprel:
    - featureName: "coolingCharacteristics.ratedCapacity"
      productGroup: "air-conditioners"
      name: "Cooling rated capacity (kW)"

synonyms:
  all:
    - "COOLINGCHARACTERISTICS-RATEDCAPACITY"
    - "RATEDCAPACITY"
    - "COOLING CAPACITY"
    - "CAPACITE DE REFROIDISSEMENT"
    - "CAPACITÉ DE REFROIDISSEMENT"
    - "PUISSANCE FRIGORIFIQUE"
parser:
  clazz: org.open4goods.api.services.aggregation.services.realtime.parser.UnitAwareNumericParser
  dimension: "POWER"
  defaultUnitHint: "kW"
  normalize: true
  trim: true
  lowerCase: false
  upperCase: true
  removeParenthesis: false
  deleteTokens:
    - "KW"
    - "K W"
    - "BTU/H"
    - "BTU"
