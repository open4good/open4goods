# ============================================================================
# CLASSE_ENERGY_HDR — Energy class HDR (Classe énergétique HDR)
# Maintained: 2026-05-24 by attributes-maintenance prompt (batch 000)
# Used in verticals: tv
# Type: TEXT
# Coverage snapshot: insufficient data from prod API
# Taxonomy coverage: icecat ❌  eprel ✅  etim ❌  wikidata ❌
# Purpose: EU energy label class for televisions in HDR mode (EU 2019/2021);
#          HDR mode is more power-intensive than SDR and affects usage impact.
# ============================================================================

key: "CLASSE_ENERGY_HDR"
userBetterIs: "GREATER"
impactBetterIs: "GREATER"
faIcon: "mdi-flash"
name:
  default: "Energy class HDR"
  fr: "Classe énergétique (HDR)"
filteringType: "TEXT"
asScore: true

referentials:
  eprel:
    - featureName: "energyClassHDR"
      productGroup: "televisions"
      name: "Energy class (HDR)"

scoring:
  scale:
    min: 0.0
    max: 5.0
  normalization:
    method: "MINMAX_FIXED"
    params:
      fixedMin: 10.0
      fixedMax: 100.0
  missingValuePolicy: "NEUTRAL"
  degenerateDistributionPolicy: "FALLBACK"
scoreTitle:
  fr: "Classe énergétique (HDR)"
  en: "Energy class (HDR)"
scoreDescription:
  fr: "La classe énergétique du téléviseur en mode HDR"
  en: "Television energy class in HDR mode"
scoreUtility:
  fr: "Met en avant la performance énergétique en HDR, un mode énergivore qui pèse sur l'empreinte d'usage des téléviseurs modernes."
  en: "Shows energy efficiency in HDR mode, which can meaningfully raise usage impact."
participateInScores:
  - ENERGY_CONSUMPTION
participateInACV:
  - USE

attributeValuesOrdering: "MAPPED"
synonyms:
  all:
    - "ENERGYCLASSHDR"
    - "CLASSE D'EFFICACITÉ ÉNERGÉTIQUE (HDR)"
  eprel:
    - "ENERGYCLASSHDR"
parser:
  normalize: true
  trim: true
  lowerCase: false
  upperCase: true
  removeParenthesis: false
  deleteTokens:
    - "CLASSE"
    - "(ÉCHELLE A++ À E)"
    - "NOT AVAILABLE"
    - "NA"
numericMapping:
  A+++: 100.0
  A++: 100.0
  A+: 100.0
  A: 100.0
  B++: 85.0
  B+: 85.0
  B: 85.0
  C++: 70.0
  C+: 70.0
  C: 70.0
  D++: 55.0
  D+: 55.0
  D: 55.0
  E++: 40.0
  E+: 40.0
  E: 40.0
  F++: 25.0
  F+: 25.0
  F: 25.0
  G: 10.0
