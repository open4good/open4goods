key: "ENERGY_CONSUMPTION_ANNUAL"
faIcon: "mdi-flash"
name:
  default: "Annual energy consumption"
  fr: "Consommation d'énergie annuelle"
suffix:
  default: "kWh/year"
  fr: "kWh/an"
filteringType: "NUMERIC"
asScore: true
userBetterIs: "LOWER"
impactBetterIs: "LOWER"
scoring:
  scale:
    min: 0.0
    max: 5.0
  normalization:
    method: "MINMAX_OBSERVED"
  missingValuePolicy: "NEUTRAL"
  degenerateDistributionPolicy: "FALLBACK"
scoreTitle:
  fr: "Consommation annuelle d'énergie"
scoreDescription:
  fr: "Consommation d'énergie annuelle en kWh"
scoreUtility:
  fr: "La consommation annuelle mesure directement l'impact environnemental en phase d'usage, principal contributeur à l'empreinte carbone."
  en: "Annual consumption directly measures the use-phase environmental impact, the main contributor to the carbon footprint."
synonyms:
  all:
    - "ENERGYCONSANNUALV2"
    - "ENERGYCONSANNUAL"
    - "CONSOLIDATEDENERGYCONSANNUAL"
    - "ENERGY CONSUMPTION ANNUAL"
    - "CONSOMMATION ANNUELLE D'ENERGIE"
    - "CONSOMMATION ANNUELLE D'ÉNERGIE"
parser:
  normalize: true
  trim: true
  lowerCase: false
  upperCase: true
  removeParenthesis: false
  deleteTokens:
    - "KWH"
    - "KWH/AN"
    - "KWH PAR AN"
    - "KWH/YEAR"
    - "KWH PER YEAR"
