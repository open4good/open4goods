  fr: "Met en lumière les pertes résiduelles quand l’appareil est éteint pour réduire le gaspillage permanent."
  en: "Highlights residual losses when the device is off to reduce permanent waste."
participateInScores:
  - ENERGY_CONSUMPTION
participateInACV:
  - USE
faIcon: "mdi-power-plug-off"

referentials:
  icecat:
    - featureId: 2034
    - featureId: 2036
  eprel:
    - featureName: "powerOffMode"

name:
  default: "Power consumption (off)"
  fr: "Consommation électrique (arrêt/veille)"

synonyms:
  all:
    - "CONSOMMATION ELECTRIQUE (ARRET)"
    - "CONSOMMATION D'ENERGIE (MODE VEILLE)"
    - "POWER_CONSUMPTION_OFF"
    - "POWERSTANDBY"
    - "POWEROFFMODE"

parser:
  normalize: true
  trim: true
  lowerCase: false
  upperCase: true
  removeParenthesis: false
