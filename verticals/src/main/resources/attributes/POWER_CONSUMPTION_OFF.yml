key: "POWER_CONSUMPTION_OFF"
userBetterIs: "LOWER"
impactBetterIs: "LOWER"
filteringType: "NUMERIC"
asScore: true
scoring:
  scale:
    min: 0.0
    max: 5.0
  normalization:
    method: "MINMAX_OBSERVED"
  missingValuePolicy: "NEUTRAL"
  degenerateDistributionPolicy: "FALLBACK"
scoreTitle:
  fr: "Consommation électrique (arret)"
scoreDescription:
  fr: "La consommation électrique à l'arrêt, ou en veille"
