key: "OVEN_ENERGY_CONSUMPTION_CYCLE"
userBetterIs: "LOWER"
impactBetterIs: "LOWER"
faIcon: "mdi-flash"
name:
  default: "Energy consumption per cycle"
  fr: "Consommation d'énergie par cycle"
suffix:
  default: "kWh/cycle"
  fr: "kWh/cycle"
filteringType: "NUMERIC"
asScore: true
scoring:
  scale:
    min: 0.0
    max: 5.0
  normalization:
    method: "MINMAX_OBSERVED"
  missingValuePolicy: "NEUTRAL"
  degenerateDistributionPolicy: "FALLBACK"
scoreTitle:
  fr: "Consommation par cycle"
scoreDescription:
  fr: "L'énergie consommée par le four lors d'un cycle de cuisson standard"
scoreUtility:
  fr: "Reflète la consommation réelle d'énergie par cuisson, indicateur direct de l'impact environnemental à l'usage."
  en: "Reflects actual energy use per cooking cycle, a direct indicator of use-phase environmental impact."
participateInScores:
  - ENERGY_CONSUMPTION
participateInACV:
  - USE
synonyms:
  all:
    - "CAVITIES[0]-ENERGYCONSUMPTIONCYCLE"
    - "CAVITIES[0]-ENERGYCONSUMPTIONCYCLEFANFORCED"
    - "ENERGYCONSUMPTIONCYCLE"
    - "ENERGYCONSUMPTIONCYCLEFANFORCED"
parser:
  normalize: true
  trim: true
  lowerCase: false
  upperCase: true
  removeParenthesis: false
  deleteTokens:
    - "KWH"
    - "KWH/CYCLE"
    - "KWH/CYCLES"
