key: "NOISE_LEVEL"
faIcon: "mdi-volume-high"
name:
  default: "Noise level"
  fr: "Niveau sonore"
suffix:
  default: "dB"
  fr: "dB"
filteringType: "NUMERIC"
asScore: true
scoring:
  scale:
    min: 0.0
    max: 5.0
  normalization:
    method: "MINMAX_OBSERVED"
  missingValuePolicy: "NEUTRAL"
  degenerateDistributionPolicy: "FALLBACK"
userBetterIs: "LOWER"
impactBetterIs: "LOWER"

synonyms:
  all:
    - "NOISE"
    - "DECIBELS_MAX"
    - "DECIBELS"
    - "NIVEAU SONORE"
    - "NIVEAU SONORE MAXIMUM"
parser:
  normalize: true
  trim: true
  lowerCase: false
  upperCase: true
  removeParenthesis: false
  deleteTokens:
    - "DB"
    - "DB(A)"
    - "DECIBEL"
    - "DECIBELS"
