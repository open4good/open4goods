# ============================================================================
# CLASSE_ENERGY — Energy class (Classe énergétique)
# Maintained: 2026-05-27 by attributes-maintenance prompt (batch 000)
# Used in verticals: _default, air-conditioner, dishwasher, oven, refrigerator,
#                    smartphones, tv, washing-machine
# Type: TEXT
# Coverage snapshot: prod legacy endpoint returned no matching canonical-key stats
# Taxonomy coverage: icecat ✅  eprel ✅  etim ❌  wikidata ❌
# Purpose: EU energy label class (A–G scale) shared across all appliance verticals;
#          primary signal for energy efficiency during daily use phase.
# ============================================================================

key: "CLASSE_ENERGY"
userBetterIs: "GREATER"
impactBetterIs: "GREATER"
faIcon: "mdi-flash"
name:
  default: "Energy class"
  fr: "Classe énergétique"
filteringType: "TEXT"
asScore: true

referentials:
  icecat:
    - featureId: 2705
      name: "Energy efficiency class"
  eprel:
    - featureName: "cavities[0].energyClass"
      productGroup: "ovens"
      name: "Energy efficiency class (oven cavity)"
    - featureName: "energyClass"
      productGroup: "dishwashers"
      name: "Energy class"
    - featureName: "energyClass"
      productGroup: "washing-machines"
      name: "Energy class"
    - featureName: "energyClass"
      productGroup: "washer-dryers"
      name: "Energy class"
    - featureName: "energyClass"
      productGroup: "refrigerators"
      name: "Energy class"
    - featureName: "energyClass"
      productGroup: "televisions"
      name: "Energy class"

scoring:
  scale:
    min: 0.0
    max: 5.0
  normalization:
    method: "MINMAX_FIXED"
    params:
      fixedMin: 10.0
      fixedMax: 100.0
  missingValuePolicy: "NEUTRAL"
  degenerateDistributionPolicy: "FALLBACK"
scoreTitle:
  fr: "Classe énergétique"
  en: "Energy class"
scoreDescription:
  fr: "La classe énergétique"
  en: "Energy efficiency class"
scoreUtility:
  fr: "Offre un repère immédiat sur l'efficacité globale de l'appareil pendant son utilisation quotidienne."
  en: "Provides a quick signal of overall energy efficiency during daily use."
participateInScores:
  - ENERGY_CONSUMPTION
participateInACV:
  - USE

attributeValuesOrdering: "MAPPED"
synonyms:
  all:
    - "CLASSE ÉNERGÉTIQUE"
    - "CLASSE ECO"
    - "CLASSE ENERGÉTIQUE"
    - "CLASSE D'EFFICACITÉ ÉNERGÉTIQUE"
    - "CLASSE D'EFFICACITE ENERGETIQUE"
    - "ENERGYCLASS"
    - "COOLINGENERGYCLASS"
    - "COOLINGCHARACTERISTICS-ENERGYCLASS"
    - "CAVITIES[0]-ENERGYCLASS"
    - "ENERGY EFFICIENCY CLASS"
    - "CLASSE_ENERGY"

parser:
  normalize: true
  trim: true
  lowerCase: false
  upperCase: true
  removeParenthesis: false
  deleteTokens:
    - "CLASSE"
    - "(ÉCHELLE A++ À E)"
    - "NOT AVAILABLE"
    - "N/A"
    - "CLASS 3"
  tokenMatch:
    - "A+++"
    - "A++"
    - "A+"
    - "A"
    - "B"
    - "C"
    - "D"
    - "E"
    - "F"
    - "G"
mappings:
  APPP: "A+++"
  APP: "A++"
  AP: "A+"
  "A ++": "A++"
  "A-40%": "A"
numericMapping:
  A+++: 100.0
  A++: 100.0
  A+: 100.0
  A: 100.0
  B++: 85.0
  B+: 85.0
  B: 85.0
  C++: 70.0
  C+: 70.0
  C: 70.0
  D++: 55.0
  D+: 55.0
  D: 55.0
  E++: 40.0
  E+: 40.0
  E: 40.0
  F++: 25.0
  F+: 25.0
  F: 25.0
  G: 10.0
