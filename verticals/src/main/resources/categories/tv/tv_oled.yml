heroBlock:
  mdiIcon: "mdi-television-classic"
  title:
    en: "Why OLED stands out"
    fr: "Ce qui distingue l'OLED"
  body:
    en: |-
      Each pixel lights itself, so blacks are truly black and contrast is
      unmatched. Ideal for film and dark-room viewing.
    fr: |-
      Chaque pixel s'éclaire seul : les noirs sont vraiment noirs et le
      contraste est inégalé. Idéal pour les films et le visionnage en pièce
      sombre.
readMore:
  title:
    en: "OLED or QLED: which should you choose?"
    fr: "OLED ou QLED : que choisir ?"
  shortText:
    en: |-
      OLED panels are self-emissive: contrast and viewing angles are excellent,
      and they often consume less on dark scenes. QLED (LED-backlit) usually
      gets brighter for sunny rooms. This page lists only OLED models.
    fr: |-
      Les dalles OLED sont auto-émissives : contraste et angles de vision
      excellents, et une consommation souvent plus faible sur les scènes
      sombres. Le QLED (rétroéclairé) monte généralement plus haut en
      luminosité pour les pièces lumineuses. Cette page ne liste que des modèles
      OLED.
  longText:
    en: |-
      Beyond picture quality, weigh durability and running cost. Check the
      energy label and the repairability and software-support indicators: on a
      premium set meant to last, a longer support window strongly improves the
      environmental balance.

      Nudger keeps this page focused on filterable OLED models so each TV stays
      comparable on price, impact score and technical attributes. For a deeper
      comparison of panel technologies, see our dedicated guide rather than this
      listing.
    fr: |-
      Au-delà de l'image, pesez la durabilité et le coût d'usage. Vérifiez
      l'étiquette énergie ainsi que les indices de réparabilité et de suivi
      logiciel : sur un modèle premium destiné à durer, une durée de support
      plus longue améliore nettement le bilan environnemental.

      Nudger garde cette page centrée sur des modèles OLED filtrables, afin que
      chaque téléviseur reste comparable sur le prix, le score d'impact et les
      caractéristiques techniques. Pour comparer en détail les technologies de
      dalle, consultez notre guide dédié plutôt que cette liste.
activatedFilters:
  - field: "attributes.indexed.DISPLAY_TECHNOLOGY.value"
    operator: "EQUALS"
    value: "OLED"
