# Search-intent subcategory for the tv vertical.
# Maintained: 2026-05-29 by subcategory.prompt.
# Intent: buying/comparison of 55-inch (139 cm) TVs - the most popular size.
# Evidence:
#   - GSC (sc-domain:nudger.fr, last 90 days): dominant size cluster for the
#     whole vertical. "55 pouces en cm" 30997 impr / 29 clicks / pos 7.7;
#     "dimension tv 55 pouces longueur et largeur" 2154 impr / 14 clicks;
#     "tv 55 pouces en cm" 6309 impr; "televiseur 55 pouces dimensions"
#     230 impr / 5 clicks; "taille tv 55 pouces" 720 impr.
#   - Google Autocomplete: very rich ("televiseur 55 pouce comparatif/promo/
#     pas cher/oled/lg/samsung/tcl", "meilleur televiseur 55 pouces 2026").
# Feasibility:
#   - Matching products: 408; distinct brands sampled: 9+ (Samsung, LG, TCL,
#     Hisense, Philips, Sony, Panasonic, Thomson, Toshiba...).
#   - Filter validated through front-api on 2026-05-29
#     (DIAGONALE_POUCES.value term "55" -> 408 results).
# Rationale:
#   - Exact-size keyword filter isolates the 139 cm format precisely (no loose
#     numeric range), so the listing answers the named purchase intent while
#     the informational "55 pouces = combien de cm" question is handled in copy.
