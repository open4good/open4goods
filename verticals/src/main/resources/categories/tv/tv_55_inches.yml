  mdiIcon: "mdi-television"
  title:
    en: "The all-rounder size"
    fr: "La taille polyvalente"
  body:
    en: |-
      55 inches equals 139 cm diagonal. It suits a viewing distance of roughly
      2 to 2.5 m, the sweet spot for most living rooms.
    fr: |-
      55 pouces correspond à 139 cm de diagonale. Cette taille convient à un
      recul d'environ 2 à 2,5 m, idéale pour la plupart des salons.
readMore:
  title:
    en: "55 inches: how big is it, and is it the right size for you?"
    fr: "55 pouces : quelle taille, et est-ce le bon format pour vous ?"
  shortText:
    en: |-
      A 55-inch screen measures 139 cm on the diagonal, about 122 cm wide and
      69 cm high. As a rule of thumb, sit 2 to 2.5 m away for a 4K set. This
      page lists only 55-inch models so you compare like for like.
    fr: |-
      Un écran 55 pouces mesure 139 cm de diagonale, environ 122 cm de large et
      69 cm de haut. En pratique, prévoyez un recul de 2 à 2,5 m pour un modèle
      4K. Cette page ne liste que des modèles 55 pouces, pour comparer à format
      égal.
  longText:
    en: |-
      Once the size is fixed, the real differences are panel technology (OLED,
      QLED or LED), energy consumption and refresh rate. At 55 inches the energy
      label matters: yearly running cost varies widely between an efficient set
      and a power-hungry one for the same picture.

      Nudger keeps this page focused on filterable 55-inch models so each TV
      stays comparable on price, environmental impact score and key technical
      attributes, instead of mixing in other sizes.
    fr: |-
      Une fois la taille fixée, les vraies différences se jouent sur la
      technologie de dalle (OLED, QLED ou LED), la consommation et la fréquence
      d'affichage. En 55 pouces, l'étiquette énergie compte : le coût annuel
      varie fortement entre un modèle sobre et un modèle énergivore, à image
      équivalente.

      Nudger garde cette page centrée sur des modèles 55 pouces filtrables,
      afin que chaque téléviseur reste comparable sur le prix, le score d'impact
      environnemental et les caractéristiques techniques, sans mélanger les
      autres tailles.
activatedFilters:
  - field: "attributes.indexed.DIAGONALE_POUCES.value"
    operator: "EQUALS"
    value: "55"
