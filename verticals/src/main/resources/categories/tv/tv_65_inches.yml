heroBlock:
  mdiIcon: "mdi-television-ambient-light"
  title:
    en: "Mind the viewing distance"
    fr: "Pensez au recul"
  body:
    en: |-
      65 inches equals 164 cm diagonal. Plan a viewing distance of about 2.5 to
      3 m so the picture stays comfortable rather than overwhelming.
    fr: |-
      65 pouces correspond à 164 cm de diagonale. Prévoyez un recul d'environ
      2,5 à 3 m pour un confort optimal sans être submergé par l'image.
readMore:
  title:
    en: "Is a 65-inch TV too big for your room?"
    fr: "Un téléviseur 65 pouces est-il trop grand pour votre pièce ?"
  shortText:
    en: |-
      A 65-inch screen measures 164 cm on the diagonal, about 144 cm wide and
      83 cm high. It shines from 2.5 m and up; below that, a 55-inch set is
      usually more comfortable. This page lists only 65-inch models.
    fr: |-
      Un écran 65 pouces mesure 164 cm de diagonale, environ 144 cm de large et
      83 cm de haut. Il s'apprécie à partir de 2,5 m de recul ; en deçà, un
      modèle 55 pouces est souvent plus confortable. Cette page ne liste que des
      modèles 65 pouces.
  longText:
    en: |-
      At this size, picture quality and energy use diverge sharply. OLED and
      QLED panels justify their price on a large screen, but the energy label
      also weighs more: a 65-inch TV draws more power than a smaller one, so an
      efficient class can noticeably cut the yearly running cost.

      Nudger keeps this page focused on filterable 65-inch models, so each TV
      stays comparable on price, environmental impact score and technical
      attributes without mixing in other sizes.
    fr: |-
      À cette taille, la qualité d'image et la consommation se creusent. Les
      dalles OLED et QLED justifient leur prix sur un grand écran, mais
      l'étiquette énergie pèse aussi davantage : un 65 pouces consomme plus
      qu'un petit modèle, et une classe efficace réduit nettement le coût annuel.

      Nudger garde cette page centrée sur des modèles 65 pouces filtrables,
      afin que chaque téléviseur reste comparable sur le prix, le score d'impact
      environnemental et les caractéristiques techniques, sans mélanger les
      autres tailles.
activatedFilters:
  - field: "attributes.indexed.DIAGONALE_POUCES.value"
    operator: "EQUALS"
    value: "65"
