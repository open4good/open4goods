readMore:
  title:
    en: "QLED or OLED: which fits your room?"
    fr: "QLED ou OLED : lequel pour votre pièce ?"
  shortText:
    en: |-
      QLED is LED-backlit with a quantum-dot layer: it gets very bright and
      suits sunny living rooms, often at a lower price than OLED. OLED wins on
      pure contrast in the dark. This page lists only QLED models.
    fr: |-
      Le QLED est rétroéclairé par LED avec une couche de quantum dots : il
      monte très haut en luminosité et convient aux salons ensoleillés, souvent
      à un prix inférieur à l'OLED. L'OLED l'emporte sur le contraste pur dans
      le noir. Cette page ne liste que des modèles QLED.
  longText:
    en: |-
      Within QLED, picture quality depends on the backlight: full-array local
      dimming (and Mini-LED) beats edge-lit panels on contrast. Watch the energy
      label too, as bright sets can consume more, and check the repairability
      and support indicators for a better long-term balance.

      Nudger keeps this page focused on filterable QLED models so each TV stays
      comparable on price, impact score and technical attributes. For a full
      technology comparison, see our dedicated guide rather than this listing.
    fr: |-
      Au sein du QLED, la qualité dépend du rétroéclairage : le full-array local
      dimming (et le Mini-LED) surpasse les dalles edge-lit sur le contraste.
      Surveillez aussi l'étiquette énergie, car les modèles très lumineux peuvent
      consommer davantage, et vérifiez les indices de réparabilité et de suivi
      pour un meilleur bilan dans la durée.

      Nudger garde cette page centrée sur des modèles QLED filtrables, afin que
      chaque téléviseur reste comparable sur le prix, le score d'impact et les
      caractéristiques techniques. Pour une comparaison complète des
      technologies, consultez notre guide dédié plutôt que cette liste.
