readMore:
  title:
    en: "How to choose an under-sink dishwasher?"
    fr: "Comment choisir un lave-vaisselle sous lavabo ?"
  shortText:
    en: |-
      An under-sink dishwasher is mainly useful when the kitchen has limited floor space. Start by checking the installation type, available height and the number of place settings you really need.
    fr: |-
      Un lave-vaisselle sous lavabo repond surtout a une contrainte de place. Verifiez d'abord le type d'installation, la hauteur disponible et le nombre de couverts vraiment necessaire.
  longText:
    en: |-
      For daily use, do not stop at the compact format. Compare the noise level if the kitchen opens onto a living room, the energy class for repeated cycles, and the useful capacity so the appliance does not run half empty too often.

      Nudger keeps this page focused on filterable products, so the list remains practical: models must match the installation intent and can still be compared on price, impact score and technical attributes.
    fr: |-
      Pour l'usage quotidien, ne vous arretez pas au format compact. Comparez le niveau sonore si la cuisine est ouverte sur le sejour, la classe energie pour les cycles repetes et la capacite utile afin d'eviter de lancer trop souvent une machine a moitie vide.

      Nudger garde cette page centree sur des produits filtrables : les modeles doivent correspondre a l'intention d'installation, tout en restant comparables sur le prix, le score d'impact et les caracteristiques techniques.
activatedFilters:
