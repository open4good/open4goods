heroBlock:
  mdiIcon: "mdi-ruler"
  title:
    en: "Narrow format"
    fr: "Format etroit"
  body:
    en: |-
      A 45 cm dishwasher saves cabinet width, but capacity and noise can vary sharply between models.
    fr: |-
      Un lave-vaisselle 45 cm economise de la largeur, mais la capacite et le bruit peuvent beaucoup varier selon les modeles.
readMore:
  title:
    en: "How to choose a 45 cm dishwasher?"
    fr: "Comment choisir un lave-vaisselle 45 cm ?"
  shortText:
  en: |-
      Start with the available width: this page keeps models around the
      45 cm format, so you can compare narrow dishwashers without mixing
      them with full-size 60 cm appliances.

      Then check capacity, noise and energy use. A narrow dishwasher is
      useful only if it still matches the number of place settings and cycles
      you need.
  fr: |-
      Commencez par la largeur disponible : cette page garde les modeles
      autour du format 45 cm, afin de comparer les lave-vaisselles etroits
      sans les melanger aux appareils 60 cm.

      Verifiez ensuite la capacite, le bruit et la consommation. Un
      lave-vaisselle etroit n'est pertinent que s'il correspond encore au
      nombre de couverts et de cycles dont vous avez besoin.
  longText:
    en: |-
      For one or two people, a 45 cm model can be a practical compromise
      between a countertop appliance and a full-size dishwasher. For a family,
      compare the usable place settings carefully: fewer settings may mean
      more frequent cycles, which can reduce the benefit of the smaller format.

      Noise matters more in small or open kitchens. If the appliance is close
      to the living area, compare decibels before small price differences, and
      check water and energy consumption together rather than relying on the
      energy class alone.

      Nudger keeps this page filterable with a bounded width range from
      43 to 47 cm. Each product can still be compared on impact score, price,
      offers, technical attributes and environmental criteria.
    fr: |-
      Pour une ou deux personnes, un modele 45 cm peut etre un bon compromis
      entre un mini lave-vaisselle et un appareil 60 cm. Pour une famille,
      comparez attentivement le nombre de couverts utiles : une capacite plus
      faible peut imposer davantage de cycles.

      Le bruit compte davantage dans une petite cuisine ou une cuisine ouverte.
      Si l'appareil est proche du sejour, comparez les decibels avant les
      petits ecarts de prix, et regardez ensemble l'eau et l'energie consommees
      plutot que la seule classe energie.

      Nudger garde cette page filtrable avec une plage de largeur bornee de
      43 a 47 cm. Chaque produit reste comparable sur le score d'impact, le
      prix, les offres, les caracteristiques techniques et les criteres
      environnementaux.
activatedFilters:
  - field: "attributes.indexed.WIDTH.numericValue"
    operator: "GREATER_THAN_OR_EQUAL"
    value: "0.43"
  - field: "attributes.indexed.WIDTH.numericValue"
    operator: "LOWER_THAN_OR_EQUAL"
    value: "0.47"
