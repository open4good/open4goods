    fr: "Au-dela de l'etiquette"
  body:
    en: |-
      Energy class A is a strong signal, but water consumption, capacity and noise still decide daily comfort.
    fr: |-
      La classe A est un bon signal, mais l'eau consommee, la capacite et le bruit restent decisifs au quotidien.
readMore:
  title:
    en: "Is a class A dishwasher always the best choice?"
    fr: "Un lave-vaisselle classe A est-il toujours le meilleur choix ?"
  shortText:
    en: |-
      A class A dishwasher can reduce electricity use, especially if you run
      frequent full loads. Still, the label should be compared with water
      consumption, noise and useful capacity.
    fr: |-
      Un lave-vaisselle classe A peut reduire la consommation d'electricite,
      surtout si vous lancez souvent des cycles bien remplis. Mais l'etiquette
      doit rester comparee a l'eau consommee, au bruit et a la capacite utile.
  longText:
    en: |-
      Start by checking whether the class A model fits your household size. A
      very efficient full-size dishwasher is not automatically better if it is
      usually half empty, just as a cheaper model can cost more over time if it
      uses more energy and water.

      Compare the noise level when the kitchen is near living spaces, and look
      at repairability or warranty signals when available. Efficiency is more
      useful when the appliance also lasts and remains comfortable to use.

      Nudger keeps this page focused on products with an indexed class A value,
      then lets you compare impact score, price history, offers and technical
      attributes before deciding.
    fr: |-
      Commencez par verifier que le modele classe A correspond a la taille de
      votre foyer. Un grand lave-vaisselle tres sobre n'est pas automatiquement
      meilleur s'il tourne souvent a moitie vide, tout comme un modele moins
      cher peut couter davantage dans la duree s'il consomme plus d'energie et
      d'eau.

      Comparez le niveau sonore lorsque la cuisine est proche des pieces de vie,
      et regardez les signaux de reparabilite ou de garantie lorsqu'ils sont
      disponibles. La sobriete est plus utile quand l'appareil dure et reste
      agreable a utiliser.

      Nudger garde cette page centree sur les produits dont la classe A est
      indexee, puis vous permet de comparer le score d'impact, l'historique de
      prix, les offres et les caracteristiques techniques avant de choisir.
