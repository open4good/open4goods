  shortText:
    en: |-
      A freestanding dishwasher is often the simplest option when the kitchen is already equipped or when you want to keep installation flexible.
    fr: |-
      Un lave-vaisselle pose libre est souvent le choix le plus simple lorsque la cuisine est deja equipee ou quand vous voulez garder une installation flexible.
  longText:
    en: |-
      Before comparing prices, check that the width, capacity and water connection match your kitchen. Then compare noise level, energy consumption and repairability indicators, because these criteria affect comfort and long-term cost.

      This subcategory keeps the listing focused on freestanding models while preserving the usual Nudger comparison tools: impact score, prices, brands, offers and technical filters.
    fr: |-
      Avant de comparer les prix, verifiez que la largeur, la capacite et le raccordement d'eau correspondent a votre cuisine. Comparez ensuite le niveau sonore, la consommation d'energie et les indicateurs de reparabilite, car ils influencent le confort et le cout dans la duree.

      Cette sous-categorie garde la liste centree sur les modeles pose libre tout en conservant les outils de comparaison Nudger : score d'impact, prix, marques, offres et filtres techniques.
