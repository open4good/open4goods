heroBlock:
  mdiIcon: "mdi-arrow-collapse-horizontal"
  title:
    en: "Compact width"
    fr: "Format compact"
  body:
    en: |-
      45cm dishwashers are designed to fit into narrow kitchen units,
      saving crucial floor space without compromising on wash quality.
    fr: |-
      Les lave-vaisselles de 45 cm sont concus pour s'integrer dans les
      meubles etroits, economisant de l'espace au sol sans compromettre
      la qualite du lavage.
readMore:
  title:
    en: "How to choose a 45cm narrow dishwasher?"
    fr: "Comment choisir un lave-vaisselle de 45 cm ?"
  shortText:
    en: |-
      A 45cm dishwasher is ideal for small households (1-2 people) or
      compact kitchens. Start by verifying if you need a built-in or
      freestanding model.
    fr: |-
      Un lave-vaisselle de 45 cm est ideal pour les petits foyers ou les
      cuisines etroites. Verifiez d'abord si vous avez besoin d'un modele
      encastrable ou pose libre.
  longText:
    en: |-
      Despite their compact footprint, these models offer versatile layouts,
      typically holding 9 to 10 place settings. Make sure to check the
      noise level, as compact appliances can sometimes be louder, and
      compare energy consumption cycle metrics.

      This subcategory filters dishwashers with a width below 50cm, helping
      you choose a model with the lowest resource footprint.
    fr: |-
      Malgre leur largeur reduite, ces modeles proposent des amenagements
      polyvalents et accueillent generalement entre 9 et 10 couverts.
      Prenez soin de verifier le niveau sonore, car les petits appareils
      sont parfois plus bruyants, et comparez la consommation energetique
      par cycle.

      Cette sous-categorie filtre les lave-vaisselles d'une largeur
      inferieure a 50 cm, vous aidant a choisir le modele ayant la plus
      faible empreinte ecologique.
activatedFilters:
  - field: "attributes.indexed.WIDTH.numericValue"
    operator: "LOWER_THAN"
    value: "0.5"
