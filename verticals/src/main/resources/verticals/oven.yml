      prefix: "|| four | fours ||"
      attrs:
        - BRAND
        - MODEL
        - YEAR
    h1Title:
      prefix: "|| Four | Fours ||"
      attrs:
        - BRAND
        - MODEL
        - YEAR
    prettyName:
      prefix: "|| Four | Fours ||"
      attrs:
        - BRAND
        - MODEL
    singular:
      prefix: "|| four | four encastrable | four électrique ||"
      attrs: []
    singularDesignation:
      prefix: "|| du four | de ce four | de ce four encastrable | de ce four électrique | de cet appareil ||"
      attrs: []
    designation:
      - "du four"
      - "de ce four"
      - "de ce four encastrable"
      - "de ce four électrique"
