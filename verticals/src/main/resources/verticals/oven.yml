##############################################################################
# Custom search filters : the following filters
# will also be availlable in search for this vertical (must be an attribute or a score)
##############################################################################
aggregationConfiguration:
  "scores.ECOSCORE.value":
    interval: 5
    buckets: 20
  "scores.WEIGHT.value":
    interval: 2
    buckets: 12
  "scores.BRAND_SUSTAINALYTICS_SCORING.value":
    interval: 1
    buckets: 5
  "scores.CLASSE_ENERGY.value":
    interval: 1
    buckets: 5
  "scores.DATA_QUALITY.value":
    interval: 1
    buckets: 5
  "attributes.indexed.WEIGHT":
    interval: 2
    buckets: 12
  "attributes.indexed.OVEN_CAPACITY":
    interval: 5
    buckets: 12
  "attributes.indexed.OVEN_POWER":
    interval: 200
    buckets: 12
  "attributes.indexed.OVEN_CAVITY_COUNT":
    interval: 1
    buckets: 4
  "attributes.indexed.OVEN_ENERGY_CONSUMPTION_CYCLE":
    interval: 0.1
    buckets: 12
  "attributes.indexed.OVEN_ENERGY_EFFICIENCY_INDEX":
    interval: 5
    buckets: 12
  "scores.OVEN_ENERGY_CONSUMPTION_CYCLE.value":
    interval: 1
    buckets: 5
  "scores.OVEN_ENERGY_EFFICIENCY_INDEX.value":
    interval: 1
    buckets: 5
  "price.minPrice.price":
    interval: 50
    buckets: 30

ecoFilters:
  - "CLASSE_ENERGY"

technicalFilters:
  - "OVEN_CAPACITY"
  - "OVEN_INSTALLATION_TYPE"
  - "OVEN_ENERGY_TYPE"
  - "OVEN_CLEANING_MODE"
  - "OVEN_COOKING_MODES"
  - "OVEN_CAVITY_COUNT"
  - "OVEN_POWER"
  - "OVEN_ENERGY_CONSUMPTION_CYCLE"

