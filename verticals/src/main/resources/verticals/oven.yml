  #        verticalUrl: "guide-achat-four-encastrable"
  #        title: "Four encastrable : comment choisir (pyrolyse, chaleur tournante, volume…)"
  #        faIcon: "mdi-star"

  en:
    url:
      prefix: "|| oven | ovens ||"
      attrs:
        - BRAND
        - MODEL
        - YEAR
    h1Title:
      prefix: "|| Oven | Ovens ||"
      attrs:
        - BRAND
        - MODEL
        - YEAR
    prettyName:
      prefix: "|| Oven | Ovens ||"
      attrs:
        - BRAND
        - MODEL
    singular:
      prefix: "|| oven | built-in oven | electric oven ||"
      attrs: []
    singularDesignation:
      prefix: "|| of the oven | of this oven | of the built-in oven | of this appliance | of the cooker ||"
      attrs: []
    designation:
      - "of the oven"
      - "of this oven"
      - "of the built-in oven"
      - "of this appliance"
      - "of the cooker"
    cardTitle: "[(${p.brand()})] [(${p.model()})]"
    shortName: "Ovens"
    longName: "Built-in and freestanding ovens"

    productMetaTitle: "[(${p.brand()})] [(${p.model()})] : Eco-score, energy use and best prices"
    productMetaDescription: "[(${p.brand()})] [(${p.model()})] : Eco-score, cycle energy use, energy efficiency and best prices."
    productMetaOpenGraphTitle: "[(${p.brand()})] - [(${p.model()})] : Ecoscore [(${p.ecoscore()})]"
    productMetaOpenGraphDescription: "[(${p.brand()})] [(${p.model()})] : compare this oven's environmental impact and best prices."
    productMetaOpenGraphType: "product"

    verticalHomeUrl: "ovens"
    verticalHomeTitle: "Ovens"
    verticalHomeDescription: "Compare built-in and freestanding ovens by capacity, cleaning mode, cycle energy use, eco-score and price so running cost and environmental impact stay visible."

#####################################################################################################################################
# NUDGE TOOL CONFIGURATION
#####################################################################################################################################
nudgeToolConfig:
  subsetGroups:
    - id: "price"
      mdiIcon: "mdi-currency-eur"
      layout: "grid"
      title:
        en: "Budget"
        fr: "Budget"
      description:
        en: "Pick a price comfort zone."
        fr: "Votre budget"
      ctaLabel:
        en: "Continue"
        fr: "Continuer"

    - id: "capacity"
      mdiIcon: "mdi-resize"
      layout: "grid"
      title:
        en: "Capacity"
        fr: "Volume"
      description:
        en: "Find the right volume for your cooking needs."
        fr: "Trouvez le bon volume pour vos besoins."
      ctaLabel:
        en: "Continue"
        fr: "Continuer"

    - id: "cleaning"
      mdiIcon: "mdi-spray-bottle"
      layout: "grid"
      title:
        en: "Cleaning"
        fr: "Nettoyage"
      description:
        en: "Choose your preferred cleaning mode."
        fr: "Choisissez votre mode de nettoyage."
      ctaLabel:
        en: "Continue"
        fr: "Continuer"

  subsets:
    ################
    # Impact Score
    ################
    - id: "impact_high"
      group: "impactscore"
      criterias:
        - field: "scores.ECOSCORE.ranking"
          fromPercent: 0
          toPercent: 33
      image: "example-image.png"
      url:
        en: "high-impact"
        fr: "fort-impact"
      caption:
        en: "High"
        fr: "Élevé"
      title:
        en: "High impact"
        fr: "Impact élevé"
      description:
        en: "Products in the highest impact third of the category."
        fr: "Produits dans le tiers le plus impactant de la catégorie."

    - id: "impact_medium"
      group: "impactscore"
      criterias:
        - field: "scores.ECOSCORE.ranking"
          fromPercent: 33
          toPercent: 67
      image: "example-image.png"
      url:
        en: "medium-impact"
        fr: "impact-moyen"
      caption:
        en: "Medium"
        fr: "Moyen"
      title:
        en: "Medium impact"
        fr: "Impact moyen"
      description:
        en: "Products in the middle impact third of the category."
        fr: "Produits dans le tiers intermédiaire de la catégorie."

    - id: "impact_low"
      group: "impactscore"
      criterias:
        - field: "scores.ECOSCORE.ranking"
          fromPercent: 67
          toPercent: 100
      image: "example-image.png"
      url:
        en: "low-impact"
        fr: "faible-impact"
      caption:
        en: "Low"
        fr: "Faible"
      title:
        en: "Low impact"
        fr: "Impact faible"
      description:
        en: "Products in the lowest impact third of the category."
        fr: "Produits dans le tiers le moins impactant de la catégorie."

    ################
    # Price
    ################
    - id: "price_lower_300"
      group: "price"
      criterias:
        - field: "price.minPrice.price"
          operator: "LOWER_THAN"
          value: "300"
        - field: "price.minPrice.price"
          operator: "GREATER_THAN"
          value: "0"
      image: "example-image.png"
      url:
        en: "low-price"
        fr: "petits-prix"
      caption:
        en: "< 300 €"
        fr: "< 300 €"
      title:
        en: "Affordable ovens"
        fr: "Fours entrée de gamme"
      description:
        en: "Ovens priced under €300."
        fr: "Les fours dont le prix est inférieur à 300€."

    - id: "price_300_1000"
      group: "price"
      criterias:
        - field: "price.minPrice.price"
          operator: "GREATER_THAN"
          value: "300"
        - field: "price.minPrice.price"
          operator: "LOWER_THAN"
          value: "1000"
      image: "example-image.png"
      url:
        en: "oven-300-1000-euros"
        fr: "four-300-1000-euros"
      caption:
        en: "300 - 1000 €"
        fr: "300 - 1000 €"
      title:
        en: "Mid-range ovens"
        fr: "Fours milieu de gamme"
      description:
        en: "Ovens priced between €300 and €1000."
        fr: "Les fours dont le prix est compris entre 300€ et 1000€."

    - id: "price_greater_1000"
      group: "price"
      criterias:
        - field: "price.minPrice.price"
          operator: "GREATER_THAN"
          value: "1000"
      image: "example-image.png"
      url:
        en: "premium-price"
        fr: "haut-de-gamme"
      caption:
        en: "> 1000 €"
        fr: "> 1000 €"
      title:
        en: "Premium ovens"
        fr: "Fours haut de gamme"
      description:
        en: "Ovens priced over €1000."
        fr: "Les fours dont le prix est supérieur à 1000€."

    ################
    # Capacity
    ################
    - id: "capacity_standard"
      group: "capacity"
      criterias:
        - field: "attributes.indexed.OVEN_CAPACITY.numericValue"
          operator: "GREATER_THAN"
          value: "60"
        - field: "attributes.indexed.OVEN_CAPACITY.numericValue"
          operator: "LOWER_THAN"
          value: "72"
      image: "example-image.png"
      url:
        en: "standard-capacity"
        fr: "capacite-standard"
      caption:
        en: "60 - 72 L"
        fr: "60 - 72 L"
      title:
        en: "Standard Capacity"
        fr: "Four standard"
      description:
        en: "Standard-size ovens for everyday family cooking."
        fr: "Fours de taille standard pour cuisiner au quotidien."

    - id: "capacity_large"
      group: "capacity"
      criterias:
        - field: "attributes.indexed.OVEN_CAPACITY.numericValue"
          operator: "GREATER_THAN"
          value: "72"
      image: "example-image.png"
      url:
        en: "large-capacity"
        fr: "grande-capacite"
      caption:
        en: "> 72 L"
        fr: "> 72 L"
      title:
        en: "Large capacity"
        fr: "Grande capacité"
      description:
        en: "Large ovens for batch cooking or bigger dishes."
        fr: "Fours grande capacité pour les grandes préparations."

    - id: "capacity_compact"
      group: "capacity"
      criterias:
        - field: "attributes.indexed.OVEN_CAPACITY.numericValue"
          operator: "LOWER_THAN"
          value: "60"
      image: "example-image.png"
      url:
        en: "compact-capacity"
        fr: "fours-compacts"
      caption:
        en: "Compact (< 60L)"
        fr: "Compact (< 60L)"
      title:
        en: "Compact Ovens"
        fr: "Fours compacts"
      description:
        en: "Compact ovens for smaller spaces or occasional cooking."
        fr: "Fours compacts pour les petits espaces."



