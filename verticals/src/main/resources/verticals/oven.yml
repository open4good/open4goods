# Unique identifier for this vertical.
# MUST contains only charracters
# SHOULD be equal to the configuration file name, without the extension
id: oven

# Cross-referential taxonomy mappings for AI-agent maintenance and semantic resolution.
referentials:
  wikidata:
    # Source: https://www.wikidata.org/wiki/Q36539
    - qid: "Q36539"
      name: "Oven"
  googleTaxonomy:
    # Source: https://www.google.com/basepages/producttype/taxonomy-with-ids.en-US.txt
    - id: 683
      name: "Home & Garden > Kitchen & Dining > Kitchen Appliances > Ovens"
  icecat:
    - categoryId: 2286
      name: "Ovens"
  etim:
    - classId: "EC001843"
      className: "Oven, built-in"
  eprel:
    - group: "ovens"

parsers:
  weight:
    minKg: 10.0
    maxKg: 100.0
  warranty:
    minYears: 0.0
    maxYears: 10.0

order: 2

# Source: https://energy-efficient-products.ec.europa.eu/product-list/cooking-appliances-ovens-and-range-hoods_en
# EC usage scenario gives 110 conventional oven cycles/year; 55 min/cycle ~= 0.28 h/day.
averageHoursPerDay: 0.3

# The associated google taxonomyID. (Ex : FR - https://www.google.com/basepages/producttype/taxonomy-with-ids.fr-FR.txt)
# SHOULD be set, it will then force this taxonomy for all products in this vertical
googleTaxonomyId: 683

#The icecat category id. Set -1 if unknown
icecatTaxonomyId: 2286

# EPREL group code (correspond to url_code in /swagger-ui/index.html#/eprel-controller/eprel)
# Source: docs/eprel_codes.md (DOMESTIC_OVEN -> ovens)
eprelGroupNames:
  - ovens

# Absolute path to the vertical image (should be hosted on nudger to avoid recaching failures).
verticalImage: https://nudger.fr/images/verticals/ovens.png

mdiIcon: mdi-stove

# Indicates if the vertical must be UI / sitemap / search rendered
enabled: true

popular: true

# The mainly presented attributes for this category
popularAttributes:
  - OVEN_CAPACITY
  - CLASSE_ENERGY
  - OVEN_INSTALLATION_TYPE
  - OVEN_CLEANING_MODE

# Attributes that are common to the category, used to guide the LLM extraction on data completion.
commonAttributes:
  - OVEN_CAPACITY
  - CLASSE_ENERGY
  - OVEN_INSTALLATION_TYPE
  - OVEN_ENERGY_TYPE
  - OVEN_CLEANING_MODE
  - OVEN_COOKING_MODES
  - OVEN_CAVITY_COUNT
  - OVEN_POWER
  - OVEN_ENERGY_CONSUMPTION_CYCLE
  - OVEN_ENERGY_EFFICIENCY_INDEX
  - WIDTH
  - HEIGHT
  - DEPTH
  - WEIGHT
  - WARRANTY
  - COLOR
  - COULEUR_EXTERIEURE

# GenAiConfig for this vertical
genAiConfig:
  # If false, will bypass the generativ ia texts generation
  enabled: false

#####################################################################################################################################
# ImpacScore configuration.
# Must stay structurally present; content will be auto-generated later.
#####################################################################################################################################

# The scores that are available to build the impact score. They come from scored attributes.
# Scores from _default.yml are merged
availableImpactScoreCriterias:
  - CLASSE_ENERGY
  - OVEN_ENERGY_CONSUMPTION_CYCLE
  - OVEN_ENERGY_EFFICIENCY_INDEX
  #  - POWER_CONSUMPTION_TYPICAL
  - WARRANTY
  # - REPAIRABILITY_INDEX
  - BRAND_SUSTAINALYTICS_SCORING
  - DATA_QUALITY
  - WEIGHT

