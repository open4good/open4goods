    productMetaDescription: "[(${p.brand()})] [(${p.model()})] : Eco-score, consommation par cycle, efficacité énergétique et meilleurs prix."
    productMetaOpenGraphTitle: "[(${p.brand()})] - [(${p.model()})] : Ecoscore de [(${p.ecoscore()})]"
    productMetaOpenGraphDescription: "[(${p.brand()})] [(${p.model()})] : comparez l'impact environnemental et les meilleurs prix de ce four."
    productMetaOpenGraphType: "product"

    # Vertical page elements
    verticalHomeUrl: "fours"
    verticalHomeTitle: "Fours"
    verticalHomeDescription: "Comparez les fours encastrables ou posables selon leur volume, leur mode de nettoyage, leur consommation par cycle, leur éco-score et leur prix pour limiter le coût d'usage et l'impact environnemental."

    # A mapping beetween custom page names behind this vertical and wiki pages
