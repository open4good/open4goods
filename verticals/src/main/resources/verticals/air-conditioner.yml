aggregationConfiguration:
  "scores.ECOSCORE.value":
    interval: 5
    buckets: 20
  "scores.CLASSE_ENERGY.value":
    interval: 1
    buckets: 5
  "scores.POWER_CONSUMPTION_TYPICAL.value":
    interval: 100
    buckets: 12
  "scores.WEIGHT.value":
    interval: 5
    buckets: 12
  "attributes.indexed.NOISE_LEVEL":
    interval: 1
    buckets: 20
  "attributes.indexed.COOLING_CAPACITY":
    interval: 0.5
    buckets: 12
  "attributes.indexed.REFRIGERANT_GWP":
    interval: 50
    buckets: 15
  "attributes.indexed.POWER_CONSUMPTION_TYPICAL":
    interval: 100
    buckets: 15
  "attributes.indexed.WEIGHT":
    interval: 5
    buckets: 12
  "price.minPrice.price":
    interval: 100
    buckets: 20

ecoFilters:
  - "CLASSE_ENERGY"
  - "POWER_CONSUMPTION_TYPICAL"

technicalFilters:
  - "PRODUCT_TYPE"
  - "NOISE_LEVEL"
  - "COOLING_CAPACITY"
  - "REFRIGERANT_NAME"

nudgeToolConfig:
  subsetGroups:
    - id: "price"
      mdiIcon: "mdi-currency-eur"
      layout: "grid"
      title:
        en: "Budget"
        fr: "Budget"
      description:
        en: "Pick a price range."
        fr: "Choisissez une fourchette de prix."
      ctaLabel:
        en: "Continue"
        fr: "Continuer"
    - id: "noise"
      mdiIcon: "mdi-volume-high"
      layout: "grid"
      title:
        en: "Noise level"
        fr: "Niveau sonore"
      description:
        en: "Filter by declared sound power."
        fr: "Filtrez selon le niveau sonore déclaré."
      ctaLabel:
        en: "Continue"
        fr: "Continuer"
  subsets:
    - id: "impact_high"
      group: "impactscore"
      criterias:
        - field: "scores.ECOSCORE.ranking"
          fromPercent: 0
          toPercent: 33
      image: "example-image.png"
      url:
        en: "high-impact"
        fr: "fort-impact"
      caption:
        en: "High"
        fr: "Eleve"
      title:
        en: "High impact"
        fr: "Impact eleve"
      description:
        en: "Products with a high environmental impact"
        fr: "Produits ayant un fort impact environnemental"
    - id: "impact_medium"
      group: "impactscore"
      criterias:
        - field: "scores.ECOSCORE.ranking"
          fromPercent: 33
          toPercent: 67
      image: "example-image.png"
      url:
        en: "medium-impact"
        fr: "impact-moyen"
      caption:
        en: "Medium"
        fr: "Moyen"
      title:
        en: "Medium impact"
        fr: "Impact moyen"
      description:
        en: "Products with a medium environmental impact"
        fr: "Produits ayant un impact environnemental moyen"
    - id: "impact_low"
      group: "impactscore"
      criterias:
        - field: "scores.ECOSCORE.ranking"
          fromPercent: 67
          toPercent: 100
      image: "example-image.png"
      url:
        en: "low-impact"
        fr: "faible-impact"
      caption:
        en: "Low"
        fr: "Faible"
      title:
        en: "Low impact"
        fr: "Impact faible"
      description:
        en: "Products with a low environmental impact"
        fr: "Produits ayant un faible impact environnemental"
    - id: "price_lower_450"
      group: "price"
      criterias:
        - field: "price.minPrice.price"
          operator: "LOWER_THAN"
          value: "450"
        - field: "price.minPrice.price"
          operator: "GREATER_THAN"
          value: "0"
      image: "example-image.png"
      url:
        en: "low-price"
        fr: "petits-prix"
      caption:
        en: "Under 450 EUR"
        fr: "Moins de 450 EUR"
      title:
        en: "< 450 EUR"
        fr: "< 450 EUR"
      description:
        en: "Air conditioners priced below 450 EUR."
        fr: "Climatiseurs dont le prix est inférieur à 450 EUR."
    - id: "price_450_1000"
      group: "price"
      criterias:
        - field: "price.minPrice.price"
          operator: "GREATER_THAN"
          value: "450"
        - field: "price.minPrice.price"
          operator: "LOWER_THAN"
          value: "1000"
      image: "example-image.png"
      url:
        en: "air-conditioners-450-1000-euros"
        fr: "climatiseurs-450-1000-euros"
      caption:
        en: "450 - 1000 EUR"
        fr: "450 - 1000 EUR"
      title:
        en: "450 - 1000 EUR"
        fr: "450 - 1000 EUR"
      description:
        en: "Air conditioners priced between 450 EUR and 1000 EUR."
        fr: "Climatiseurs dont le prix est compris entre 450 EUR et 1000 EUR."
    - id: "price_greater_1000"
      group: "price"
      criterias:
        - field: "price.minPrice.price"
          operator: "GREATER_THAN"
          value: "1000"
      image: "example-image.png"
      url:
        en: "premium-price"
        fr: "haut-de-gamme"
      caption:
        en: "Over 1000 EUR"
        fr: "Plus de 1000 EUR"
      title:
        en: "> 1000 EUR"
        fr: "> 1000 EUR"
      description:
        en: "Air conditioners priced above 1000 EUR."
        fr: "Climatiseurs dont le prix est supérieur à 1000 EUR."
    - id: "quiet_air_conditioners"
      group: "noise"
      criterias:
        - field: "attributes.indexed.NOISE_LEVEL.numericValue"
          operator: "LOWER_THAN"
          value: "61"
      image: "example-image.png"
      url:
        en: "quiet-air-conditioners"
        fr: "climatiseurs-silencieux"
      caption:
        en: "Under 61 dB"
        fr: "Moins de 61 dB"
      title:
        en: "Quiet models"
        fr: "Modèles silencieux"
      description:
        en: "Air conditioners with a declared noise level below 61 dB."
        fr: "Climatiseurs dont le niveau sonore déclaré est inférieur à 61 dB."
    - id: "standard_noise_air_conditioners"
      group: "noise"
      criterias:
        - field: "attributes.indexed.NOISE_LEVEL.numericValue"
          operator: "GREATER_THAN"
          value: "61"
        - field: "attributes.indexed.NOISE_LEVEL.numericValue"
          operator: "LOWER_THAN"
          value: "64"
      image: "example-image.png"
      url:
        en: "standard-noise-air-conditioners"
        fr: "climatiseurs-bruit-standard"
      caption:
        en: "61 - 64 dB"
        fr: "61 - 64 dB"
      title:
        en: "Standard noise"
        fr: "Bruit standard"
      description:
        en: "Air conditioners with a declared noise level between 61 dB and 64 dB."
        fr: "Climatiseurs dont le niveau sonore déclaré se situe entre 61 dB et 64 dB."
    - id: "loud_air_conditioners"
      group: "noise"
      criterias:
        - field: "attributes.indexed.NOISE_LEVEL.numericValue"
          operator: "GREATER_THAN"
          value: "64"
      image: "example-image.png"
      url:
        en: "loud-air-conditioners"
        fr: "climatiseurs-bruyants"
      caption:
        en: "Over 64 dB"
        fr: "Plus de 64 dB"
      title:
        en: "Louder models"
        fr: "Modèles plus bruyants"
      description:
        en: "Air conditioners with a declared noise level above 64 dB."
        fr: "Climatiseurs dont le niveau sonore déclaré dépasse 64 dB."

