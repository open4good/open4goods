# Unique identifier for this vertical.
# MUST be equal to the configuration file name, without the extension.
id: air-conditioner

parsers:
  weight:
    minKg: 5.0
    maxKg: 120.0
  warranty:
    minYears: 0.0
    maxYears: 10.0

order: 9

# Source: DOE/FEMP room air conditioner test assumption, 750 operating hours/year.
# https://www.energy.gov/femp/purchasing-energy-efficient-room-air-conditioners
averageHoursPerDay: 2.05

# Source: Google product taxonomy id 605, Air Conditioners.
# https://productcategory.net/finder/home-and-garden/household-appliances/climate-control-appliances/air-conditioners
googleTaxonomyId: 605

# Unknown Icecat category for this vertical.
icecatTaxonomyId: -1

# Source: EPREL product group for air conditioners, Regulation (EU) 626/2011.
# https://energy-efficient-products.ec.europa.eu/suppliers/eprel-suppliers_en
eprelGroupNames:
  - airconditioners

verticalImage: https://nudger.fr/images/verticals/air-conditioner.png
mdiIcon: mdi-air-conditioner

enabled: true
popular: false

availableImpactScoreCriterias:
  - CLASSE_ENERGY
  - POWER_CONSUMPTION_TYPICAL
  - POWER_CONSUMPTION_OFF
  - REFRIGERANT_GWP
  - REPAIRABILITY_INDEX
  - WARRANTY
  - WEIGHT
  - DATA_QUALITY
  - BRAND_SUSTAINALYTICS_SCORING

popularAttributes:
  - CLASSE_ENERGY
  - PRODUCT_TYPE
  - POWER_CONSUMPTION_TYPICAL
  - NOISE_LEVEL

commonAttributes:
  - CLASSE_ENERGY
  - PRODUCT_TYPE
  - AIR_CONDITIONER_FUNCTION_TYPE
  - COOLING_CAPACITY
  - POWER_CONSUMPTION_TYPICAL
  - POWER_CONSUMPTION_OFF
  - NOISE_LEVEL
  - REFRIGERANT_NAME
  - REFRIGERANT_GWP
  - WEIGHT
  - WARRANTY

