dataviz:
  chartOverrides:
    noise-level-distribution:
      title: "Repartition des niveaux sonores"
      description: "Comparez le bruit declare des climatiseurs"
    energy-class-distribution:
      title: "Repartition des classes energetiques"
      description: "Visualisez l'efficacite energetique du marche"
  heroKpis:
    - field: "attributes.indexed.NOISE_LEVEL"
      label: "Bruit moyen"
      unit: "dB"
      aggregation: "avg"
    - field: "attributes.indexed.COOLING_CAPACITY"
      label: "Puissance frigorifique moyenne"
      unit: "kW"
      aggregation: "avg"
    - field: "scores.ECOSCORE.value"
      label: "Eco-score moyen"
      aggregation: "avg"
    - field: "price.minPrice.price"
      label: "Prix moyen"
      unit: "EUR"
      aggregation: "avg"

