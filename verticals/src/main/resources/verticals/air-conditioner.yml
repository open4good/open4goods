    - "HOME & GARDEN > HOUSEHOLD APPLIANCES > CLIMATE CONTROL APPLIANCES > AIR CONDITIONERS"
  ManoMano FR:
    - "428 | DIY | BRICOLAGE - OUTILLAGE - QUINCAILLERIE | BRICOLAGE - OUTILLAGE - QUINCAILLERIE > GENIE THERMIQUE - CLIMATIQUE - CHAUFFAGE > CLIMATISEUR MOBILE | GENIE THERMIQUE - CLIMATIQUE - CHAUFFAGE | CLIMATISEUR MOBILE"
    - "428 | DIY | BRICOLAGE - OUTILLAGE - QUINCAILLERIE | BRICOLAGE - OUTILLAGE - QUINCAILLERIE > GENIE THERMIQUE - CLIMATIQUE - CHAUFFAGE > CLIMATISEUR FIXE | GENIE THERMIQUE - CLIMATIQUE - CHAUFFAGE | CLIMATISEUR FIXE"
  Castorama FR:
    - "CLIMATISEUR MOBILE | MAGASIN CASTORAMA > CHAUFFAGE, CLIMATISATION ET VENTILATION > CLIMATISATION ET RAFRAICHISSEMENT D'AIR > CLIMATISEUR MOBILE | CHAUFFAGE, CLIMATISATION ET VENTILATION | CLIMATISATION ET RAFRAICHISSEMENT D'AIR"
  Cdiscount FR:
    - "GROS ELECTROMENAGER / CLIMATISEUR / CLIMATISEUR MOBILE | GROS ELECTROMENAGER>CLIMATISEUR>CLIMATISEUR MOBILE | CLIMATISEUR | CLIMATISEUR MOBILE"
    - "GROS ELECTROMENAGER / CLIMATISEUR / CLIMATISEUR FIXE | GROS ELECTROMENAGER>CLIMATISEUR>CLIMATISEUR FIXE | CLIMATISEUR | CLIMATISEUR FIXE"
  RueDuCommerce FR:
    - "CLIMATISEUR"

aggregationConfiguration:
  "scores.ECOSCORE.value":
    interval: 5
    buckets: 20
  "scores.CLASSE_ENERGY.value":
    interval: 1
    buckets: 5
  "scores.POWER_CONSUMPTION_TYPICAL.value":
    interval: 100
    buckets: 12
  "scores.WEIGHT.value":
    interval: 5
    buckets: 12
  "price.minPrice.price":
    interval: 100
    buckets: 20

ecoFilters:
  - "CLASSE_ENERGY"
  - "POWER_CONSUMPTION_TYPICAL"

technicalFilters:
  - "NOISE_LEVEL"

attributesConfig:
  configs:
    - key: "CLASSE_ENERGY"
    - key: "POWER_CONSUMPTION_TYPICAL"
    - key: "POWER_CONSUMPTION_OFF"
    - key: "NOISE_LEVEL"
    - key: "WEIGHT"
    - key: "REPAIRABILITY_INDEX"
    - key: "WARRANTY"
    - key: "BRAND_SUSTAINALYTICS_SCORING"
    - key: "DATA_QUALITY"
