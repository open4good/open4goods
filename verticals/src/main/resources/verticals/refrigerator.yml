# Unique identifier for this vertical.
# MUST contains only charracters
# SHOULD be equal to the configuration file name, without the extension
id: refrigerator

# Cross-referential taxonomy mappings for AI-agent maintenance and semantic resolution.
referentials:
  wikidata:
    - qid: "Q3751369"
      name: "Refrigerator"
  googleTaxonomy:
    - id: 686
      name: "Home & Garden > Household Appliances > Refrigerators"
  icecat: []
  etim:
    - classId: "EC000438"
      className: "Refrigerator"
    - classId: "EC000440"
      className: "Refrigerator-freezer combination"
  eprel:
    - group: "refrigeratingappliances"
    - group: "refrigeratingappliances2019"
    - group: "professionalrefrigeratedstoragecabinets"

parsers:
  weight:
    minKg: 20.0
    maxKg: 250.0
  warranty:
    minYears: 0.0
    maxYears: 10.0

order: 8
# Refrigerators run continuously; annual energy labels are based on 24h/day operation.
averageHoursPerDay: 24.0

# The associated google taxonomyID. (Ex : FR - https://www.google.com/basepages/producttype/taxonomy-with-ids.fr-FR.txt)
# SHOULD be set, it will then force this taxonomy for all products in this vertical
googleTaxonomyId: 686

#The icecat category id. Set -1 if unknown
icecatTaxonomyId: -1

# EPREL group code
eprelGroupNames:
  - refrigeratingappliances
  - refrigeratingappliances2019
  - professionalrefrigeratedstoragecabinets

# Absolute path to the vertical image (should be hosted on nudger to avoid recaching failures).
verticalImage: https://nudger.fr/images/verticals/refrigerator.png

mdiIcon: mdi-fridge-outline

# Indicates if the vertical must be UI / sitemap / search rendered
enabled: true

popular: true

# The mainly presented attributes for this category

# The mainly presented attributes for this category
popularAttributes:
  - TOTAL_VOLUME
  - COOLING_SYSTEM
  - DOOR_COUNT

commonAttributes:
  - CLASSE_ENERGY
  - ENERGY_CONSUMPTION_ANNUAL
  - TOTAL_VOLUME
  - FRIDGE_NET_CAPACITY
  - FREEZER_NET_CAPACITY
  - NOISE_LEVEL
  - NOISE_CLASS
  - REFRIGERATOR_TYPE
  - PRODUCT_TYPE
  - COOLING_SYSTEM
  - DOOR_COUNT
  - CLIMATE_CLASS
  - OPENING_TYPE
  - ENERGY_EFFICIENCY_INDEX
  - AMBIENT_TEMPERATURE_MIN
  - AMBIENT_TEMPERATURE_MAX

requiredAttributes:
  - CLASSE_ENERGY

# GenAiConfig for this vertical
genAiConfig:
  # If false, will bypass the generativ ia texts generation
  enabled: true

#####################################################################################################################################
# ImpacScore configuration.
# Must stay structurally present; content will be auto-generated later.
#####################################################################################################################################

# The scores that are available to build the impact score. They come from scored attributes.
# Scores from _default.yml are merged
availableImpactScoreCriterias:
  - CLASSE_ENERGY
  - DATA_QUALITY
  - NOISE_LEVEL
  - WARRANTY
  - WEIGHT

#####################################################################################################################################
# I18N CONFIGURATION
######################################################################################################################################
i18n:
  fr:
    # Product URL & H1
    url:
      prefix: "|| réfrigérateur | refrigerateur | frigo ||"
      attrs:
        - BRAND
        - MODEL
        - YEAR
    designation:
      - "du réfrigérateur"
      - "de ce réfrigérateur"
      - "du frigo"
      - "de ce frigo"
      - "de cet appareil"

    # Product metas (generic templates reused)
    productMetaOpenGraphType: "product"

    # Vertical page elements
    verticalHomeUrl: "frigos"
    verticalHomeTitle: "Réfrigérateurs"
    verticalHomeDescription: "Comparez les réfrigérateurs selon leur impact environnemental, leur volume utile, leur classe énergétique et leur prix. Repérez les modèles les plus sobres pour conserver vos aliments avec moins d'électricité au quotidien."

    # A mapping beetween custom page names behind this vertical and wiki pages (sample)
  #    wikiPages:
  #      - wikiUrl: verticals:refrigerators:guide-achat-frigos:WebHome
  #        verticalUrl: "guide-achat-frigo-encastrable"
  #        title: "Frigo : comment choisir (pyrolyse, chaleur tournante, volume…)"
  #        faIcon: "mdi-star"

  en:
    url:
      prefix: "|| refrigerator | fridge ||"
      attrs:
        - BRAND
        - MODEL
        - YEAR
    designation:
      - "of the refrigerator"
      - "of this refrigerator"
      - "of the fridge"
      - "of this fridge"
      - "of the appliance"

    productMetaOpenGraphType: "product"

    verticalHomeUrl: "refrigerators"
    verticalHomeTitle: "Refrigerators"
    verticalHomeDescription: "Compare refrigerators by environmental impact, useful capacity, energy class, and price. Find efficient models that keep food fresh while using less electricity every day."

#####################################################################################################################################
# NUDGE TOOL CONFIGURATION
#####################################################################################################################################
nudgeToolConfig:
  subsetGroups:
    - id: "price"
      mdiIcon: "mdi-currency-eur"
      layout: "grid"
      title:
        en: "Budget"
        fr: "Budget"
      description:
        en: "Filter by price range"
        fr: "Votre budget"
      ctaLabel:
        en: "See products"
        fr: "Voir les produits"

    - id: "volume"
      mdiIcon: "mdi-fridge-outline"
      layout: "grid"
      title:
        en: "Capacity"
        fr: "Capacité"
      description:
        en: "Filter by total volume (Fridge + Freezer)"
        fr: "Volume total (Réfrigérateur + Congélateur)"
      ctaLabel:
        en: "See products"
        fr: "Voir les produits"

  subsets:
    ################
    # Impact Score
    ################
    - id: "impact_high" # Worst 33% (high environmental impact)
      group: "impactscore"
      criterias:
        - field: "scores.ECOSCORE.ranking"
          fromPercent: 0
          toPercent: 33
      image: "example-image.png"
      url:
        en: "high-impact"
        fr: "fort-impact"
      caption:
        en: "High"
        fr: "Élevé"
      title:
        en: "High impact"
        fr: "Impact élevé"
      description:
        en: "Refrigerators in the highest environmental-impact tier"
        fr: "Réfrigérateurs dans le tiers d'impact environnemental le plus élevé"

    - id: "impact_medium" # Middle 34%
      group: "impactscore"
      criterias:
        - field: "scores.ECOSCORE.ranking"
          fromPercent: 33
          toPercent: 67
      image: "example-image.png"
      url:
        en: "medium-impact"
        fr: "impact-moyen"
      caption:
        en: "Medium"
        fr: "Moyen"
      title:
        en: "Medium impact"
        fr: "Impact moyen"
      description:
        en: "Refrigerators in the middle environmental-impact tier"
        fr: "Réfrigérateurs dans le tiers d'impact environnemental intermédiaire"

    - id: "impact_low" # Best 33% (low environmental impact)
      group: "impactscore"
      criterias:
        - field: "scores.ECOSCORE.ranking"
          fromPercent: 67
          toPercent: 100
      image: "example-image.png"
      url:
        en: "low-impact"
        fr: "faible-impact"
      caption:
        en: "Low"
        fr: "Faible"
      title:
        en: "Low impact"
        fr: "Impact faible"
      description:
        en: "Refrigerators in the lowest environmental-impact tier"
        fr: "Réfrigérateurs dans le tiers d'impact environnemental le plus faible"

    # Price Subsets
    - id: "price_lower_500"
      group: "price"
      criterias:
        - field: "price.minPrice.price"
          operator: "LOWER_THAN"
          value: "500"
        - field: "price.minPrice.price"
          operator: "GREATER_THAN"
          value: "0"
      image: "example-image.png"
      url:
        en: "low-price"
        fr: "petits-prix"
      caption:
        en: "< 500 €"
        fr: "< 500 €"
      title:
        en: "Budget-friendly"
        fr: "Petits prix"
      description:
        en: "Refrigerators under €500"
        fr: "Réfrigérateurs à moins de 500 €"

    - id: "price_500_1100"
      group: "price"
      criterias:
        - field: "price.minPrice.price"
          operator: "GREATER_THAN"
          value: "500"
        - field: "price.minPrice.price"
          operator: "LOWER_THAN"
          value: "1100"
      image: "example-image.png"
      url:
        en: "mid-range-price"
        fr: "milieu-de-gamme"
      caption:
        en: "500 - 1100 €"
        fr: "500 - 1100 €"
      title:
        en: "Standard range"
        fr: "Milieu de gamme"
      description:
        en: "Refrigerators between €500 and €1100"
        fr: "Réfrigérateurs entre 500 € et 1100 €"

    - id: "price_greater_1100"
      group: "price"
      criterias:
        - field: "price.minPrice.price"
          operator: "GREATER_THAN"
          value: "1100"
      image: "example-image.png"
      url:
        en: "premium-price"
        fr: "haut-de-gamme"
      caption:
        en: "> 1100 €"
        fr: "> 1100 €"
      title:
        en: "Premium"
        fr: "Haut de gamme"
      description:
        en: "Refrigerators over €1100"
        fr: "Réfrigérateurs à plus de 1100 €"

    # Volume Subsets
    - id: "volume_small"
      group: "volume"
      criterias:
        - field: "attributes.indexed.TOTAL_VOLUME.numericValue"
          operator: "LOWER_THAN"
          value: "260"
      image: "example-image.png"
      url:
        en: "small-capacity"
        fr: "petite-capacite"
      caption:
        en: "< 260 L"
        fr: "< 260 L"
      title:
        en: "Small capacity"
        fr: "Petite capacité"
      description:
        en: "Ideal for small spaces or couples"
        fr: "Idéal pour les petits espaces ou les couples"

    - id: "volume_medium"
      group: "volume"
      criterias:
        - field: "attributes.indexed.TOTAL_VOLUME.numericValue"
          operator: "GREATER_THAN"
          value: "260"
        - field: "attributes.indexed.TOTAL_VOLUME.numericValue"
          operator: "LOWER_THAN"
          value: "360"
      image: "example-image.png"
      url:
        en: "medium-capacity"
        fr: "capacite-standard"
      caption:
        en: "260 - 360 L"
        fr: "260 - 360 L"
      title:
        en: "Standard capacity"
        fr: "Capacité standard"
      description:
        en: "Standard size for families"
        fr: "Taille standard pour les familles"

    - id: "volume_large"
      group: "volume"
      criterias:
        - field: "attributes.indexed.TOTAL_VOLUME.numericValue"
          operator: "GREATER_THAN"
          value: "360"
      image: "example-image.png"
      url:
        en: "large-capacity"
        fr: "grande-capacite"
      caption:
        en: "> 360 L"
        fr: "> 360 L"
      title:
        en: "Large capacity"
        fr: "Grande capacité"
      description:
        en: "Generous space for large families"
        fr: "Espace généreux pour les grandes familles"

