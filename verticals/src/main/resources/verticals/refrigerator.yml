##############################################################################
# Custom search filters : the following filters
# will also be availlable in search for this vertical (must be an attribute or a score)
##############################################################################
aggregationConfiguration:
  "scores.CLASSE_ENERGY.value":
    interval: 1
    buckets: 5
  "price.minPrice.price":
    interval: 50
    buckets: 30
  "attributes.indexed.TOTAL_VOLUME":
    interval: 50
    buckets: 20
  "attributes.indexed.FRIDGE_NET_CAPACITY":
    interval: 50
    buckets: 20
  "attributes.indexed.FREEZER_NET_CAPACITY":
    interval: 50
    buckets: 20
  "attributes.indexed.ENERGY_CONSUMPTION_ANNUAL":
    interval: 50
    buckets: 20
  "attributes.indexed.NOISE_LEVEL":
    interval: 1
    buckets: 15
  "attributes.indexed.ENERGY_EFFICIENCY_INDEX":
    interval: 5
    buckets: 20
  "attributes.indexed.AMBIENT_TEMPERATURE_MIN":
    interval: 1
    buckets: 20
  "attributes.indexed.AMBIENT_TEMPERATURE_MAX":
    interval: 1
    buckets: 30

ecoFilters:
  - "CLASSE_ENERGY"

technicalFilters:
  - "TOTAL_VOLUME"
  - "FRIDGE_NET_CAPACITY"
  - "FREEZER_NET_CAPACITY"
  - "ENERGY_CONSUMPTION_ANNUAL"
  - "NOISE_LEVEL"
  - "NOISE_CLASS"
  - "REFRIGERATOR_TYPE"
  - "PRODUCT_TYPE"
  - "COOLING_SYSTEM"
  - "DOOR_COUNT"
  - "LOW_NOISE"
  - "CLIMATE_CLASS"
  - "OPENING_TYPE"
  - "ENERGY_EFFICIENCY_INDEX"
  - "AMBIENT_TEMPERATURE_MIN"
  - "AMBIENT_TEMPERATURE_MAX"

dataviz:
  chartOverrides:
    total-volume-distribution:
      title: "Répartition des volumes utiles"
      description: "Comparez les capacités les plus courantes"
    energy-class-distribution:
      title: "Répartition des classes énergétiques"
      description: "Visualisez la performance énergétique du marché"
  heroKpis:
    - field: "attributes.indexed.TOTAL_VOLUME"
      label: "Volume moyen"
      unit: "L"
      aggregation: "avg"
    - field: "scores.ECOSCORE.value"
      label: "Eco-score moyen"
      aggregation: "avg"
    - field: "price.minPrice.price"
      label: "Prix moyen"
      unit: "€"
      aggregation: "avg"

