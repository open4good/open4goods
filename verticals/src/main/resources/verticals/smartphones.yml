aggregationConfiguration:
  "scores.ECOSCORE.value":
    interval: 1
    buckets: 12
  "scores.REPAIRABILITY_INDEX.value":
    interval: 1
    buckets: 10
  "attributes.indexed.STORAGE_CAPACITY":
    interval: 128
    buckets: 8
  "attributes.indexed.RAM_CAPACITY":
    interval: 4
    buckets: 8
  "attributes.indexed.DIAGONALE_POUCES":
    interval: 0.5
    buckets: 8
  "attributes.indexed.CLASSE_ENERGY":
    interval: 1
    buckets: 10
  "price.minPrice.price":
    interval: 50
    buckets: 20

ecoFilters:
  - REPAIRABILITY_INDEX
  - WARRANTY
  - CLASSE_ENERGY

technicalFilters:
  - STORAGE_CAPACITY
  - RAM_CAPACITY
  - MOBILE_NETWORK_GENERATION
  - DIAGONALE_POUCES

dataviz:
  chartOverrides:
    storage-capacity-distribution:
      title: "Répartition des capacités de stockage"
      description: "Comparez les capacités internes les plus courantes"
    repairability-distribution:
      title: "Répartition des indices de réparabilité"
      description: "Visualisez les niveaux de réparabilité disponibles"
  heroKpis:
    - field: "attributes.indexed.STORAGE_CAPACITY"
      label: "Stockage moyen"
      unit: "Go"
      aggregation: "avg"
    - field: "scores.ECOSCORE.value"
      label: "Eco-score moyen"
      aggregation: "avg"
    - field: "price.minPrice.price"
      label: "Prix moyen"
      unit: "EUR"
      aggregation: "avg"

popularAttributes:
  - STORAGE_CAPACITY
  - RAM_CAPACITY
  - MOBILE_NETWORK_GENERATION
  - REPAIRABILITY_INDEX

commonAttributes:
