# Smartphones vertical — bootstrap (Phase A).
# matchingCategories below is a SEED (top primary smartphone categories from the
# raw products-moustik index). It will be replaced/extended by Phase B
# (GET /update/smartphones/categories/) once aggregation has tagged products
# with vertical=smartphones. Accessories are pruned automatically by the
# inherited excludingTokensFromCategoriesMatching list in _default.yml
# (ACCESSOIRE, CABLE, MEUBLE, QUINCAILLERIE).

id: smartphones

order: 3
enabled: true
popular: true

mdiIcon: mdi-cellphone
verticalImage: https://nudger.fr/images/verticals/smartphones.png

# Google taxonomy: "Electronics > Communications > Telephony > Mobile Phones"
# (no separate Smartphones leaf in FR taxonomy as of 2024-07).
googleTaxonomyId: 267

# Unknown — do not guess. Refine via /icecat/categories/search once the
# Icecat index is loaded locally.
icecatTaxonomyId: -1

# EU EPREL: smartphones+tablets are covered by Reg. (EU) 2023/1669 since 2025-06-20.
# Source: docs/eprel_codes.md (SMARTPHONE_TABLET_2023_1669).
eprelGroupNames:
  - smartphonestablets20231669

# Realistic physical bounds for a smartphone (vs. 0.001–2000 kg in _default.yml).
# Smallest ~100 g (Palm/Jelly), largest ~400 g (gaming/rugged phablet);
# 0.08–0.6 kg leaves headroom for packaging-included weights.
parsers:
  weight:
    minKg: 0.08
    maxKg: 0.6

# Daily active screen time per ARCEP/CREDOC "Baromètre du numérique 2024"
# (smartphones, French adults). Drives kWh/year cost projection.
averageHoursPerDay: 3.5

