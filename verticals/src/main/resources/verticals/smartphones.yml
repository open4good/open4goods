    singularDesignation:
      prefix: "|| of the smartphone | of this smartphone | of the phone | of this device ||"
      attrs: []
    designation:
      - "of the smartphone"
      - "of this smartphone"
      - "of the mobile phone"
      - "of this device"
    cardTitle: "{BRAND} {MODEL}"
    shortName: "{BRAND} {MODEL}"
    longName: "{BRAND} {MODEL} - {STORAGE_CAPACITY}"

