    verticalHomeTitle: "Smartphones"
    verticalHomeDescription: "Explore our selection of smartphones. Manufacturing, critical metals, lifespan and repairability make the smartphone one of the most environmentally impactful electronic devices. Nudger helps you pick the most responsible model without giving up the features you need."

availableImpactScoreCriterias:
  - REPAIRABILITY_INDEX
  - WARRANTY
  - WEIGHT
  - CLASSE_ENERGY     # EU Reg. 2023/1669; 589 hits (1.3%)
  - DATA_QUALITY      # _default.yml required entry (§5 inheritance)
  - BRAND_SUSTAINALYTICS_SCORING  # _default.yml required entry (§5 inheritance)

nudgeToolConfig:
  subsetGroups:
    - id: "price"
      mdiIcon: "mdi-currency-eur"
      layout: "grid"
      title:
        en: "Budget"
        fr: "Budget"
      description:
        en: "Choose the price range that fits your budget."
        fr: "Choisissez la tranche de prix adaptée à votre budget."
      ctaLabel:
        en: "Continue"
        fr: "Continuer"
    - id: "storage"
      mdiIcon: "mdi-harddisk"
      layout: "grid"
      title:
        en: "Storage"
        fr: "Stockage"
      description:
        en: "Pick the internal storage capacity you need."
        fr: "Choisissez la capacité de stockage dont vous avez besoin."
      ctaLabel:
        en: "Continue"
        fr: "Continuer"
  scores:
    - scoreName: ENERGY_CONSUMPTION
      fromPercent: 50
      mdiIcon: "mdi-lightning-bolt"
      title:
        en: "Energy consumption"
        fr: "Consommation d'énergie"
      description:
        en: "Products with low energy consumption"
        fr: "Produits avec faible consommation énergétique"
    - scoreName: DURABILITY
      fromPercent: 50
      mdiIcon: "mdi-archive-outline"
      title:
        en: "Durability"
        fr: "Durabilité"
      description:
        en: "Products with good durability"
        fr: "Produits durables"
    - scoreName: REPARABILITY
      fromPercent: 50
      mdiIcon: "mdi-tools"
      title:
        en: "Repairability"
        fr: "Réparabilité"
      description:
        en: "Products that are easier to repair"
        fr: "Produits plus faciles à réparer"
    - scoreName: ESG
      fromPercent: 50
      mdiIcon: "mdi-scale-balance"
      disabled: true
      title:
        en: "ESG criteria"
        fr: "Critères ESG"
      description:
        en: "Models from brands with stronger ESG ratings"
        fr: "Modèles dont la marque dispose d'un meilleur indice ESG"
  subsets:
    - id: "impact_high"
      group: "impactscore"
      criterias:
        - field: "scores.ECOSCORE.value"
          operator: "LOWER_THAN_OR_EQUAL"
          value: "10.88"
      image: "example-image.png"
      url:
        en: "high-impact"
        fr: "fort-impact"
      caption:
        en: "High"
        fr: "Élevé"
      title:
        en: "High impact"
        fr: "Impact élevé"
      description:
        en: "Smartphones with a high environmental impact."
        fr: "Smartphones ayant un fort impact environnemental."
    - id: "impact_medium"
      group: "impactscore"
      criterias:
        - field: "scores.ECOSCORE.value"
          operator: "GREATER_THAN"
          value: "10.88"
        - field: "scores.ECOSCORE.value"
          operator: "LOWER_THAN_OR_EQUAL"
          value: "11.54"
      image: "example-image.png"
      url:
        en: "medium-impact"
        fr: "impact-moyen"
      caption:
        en: "Medium"
        fr: "Moyen"
      title:
        en: "Medium impact"
        fr: "Impact moyen"
      description:
        en: "Smartphones with a medium environmental impact."
        fr: "Smartphones ayant un impact environnemental moyen."
    - id: "impact_low"
      group: "impactscore"
      criterias:
        - field: "scores.ECOSCORE.value"
          operator: "GREATER_THAN"
          value: "11.54"
      image: "example-image.png"
      url:
        en: "low-impact"
        fr: "faible-impact"
      caption:
        en: "Low"
        fr: "Faible"
      title:
        en: "Low impact"
        fr: "Impact faible"
      description:
        en: "Smartphones with a lower environmental impact."
        fr: "Smartphones ayant un impact environnemental plus faible."
    - id: "price_entry"
      group: "price"
      criterias:
        - field: "price.minPrice.price"
          operator: "LOWER_THAN_OR_EQUAL"
          value: "150"
      image: "example-image.png"
      url:
        en: "smartphones-under-150-euros"
        fr: "smartphones-moins-150-euros"
      caption:
        en: "<= 150 EUR"
        fr: "<= 150 EUR"
      title:
        en: "Entry smartphones"
        fr: "Smartphones accessibles"
      description:
        en: "Smartphones priced at 150 EUR or less."
        fr: "Smartphones dont le prix est inférieur ou égal à 150 EUR."
    - id: "price_mid"
      group: "price"
      criterias:
        - field: "price.minPrice.price"
          operator: "GREATER_THAN"
          value: "150"
        - field: "price.minPrice.price"
          operator: "LOWER_THAN_OR_EQUAL"
          value: "300"
      image: "example-image.png"
      url:
        en: "smartphones-150-300-euros"
        fr: "smartphones-150-300-euros"
      caption:
        en: "150 - 300 EUR"
        fr: "150 - 300 EUR"
      title:
        en: "Mid-range smartphones"
        fr: "Smartphones milieu de gamme"
      description:
        en: "Smartphones priced between 150 EUR and 300 EUR."
        fr: "Smartphones dont le prix est compris entre 150 EUR et 300 EUR."
    - id: "price_premium"
      group: "price"
      criterias:
        - field: "price.minPrice.price"
          operator: "GREATER_THAN"
          value: "300"
      image: "example-image.png"
      url:
        en: "premium-smartphones"
        fr: "smartphones-premium"
      caption:
        en: "> 300 EUR"
        fr: "> 300 EUR"
      title:
        en: "Premium smartphones"
        fr: "Smartphones premium"
      description:
        en: "Smartphones priced above 300 EUR."
        fr: "Smartphones dont le prix est supérieur à 300 EUR."
    - id: "storage_basic"
      group: "storage"
      criterias:
        - field: "attributes.indexed.STORAGE_CAPACITY.numericValue"
          operator: "LOWER_THAN_OR_EQUAL"
          value: "128"
      image: "example-image.png"
      url:
        en: "smartphones-up-to-128gb"
        fr: "smartphones-jusqu-a-128go"
      caption:
        en: "<= 128 GB"
        fr: "<= 128 Go"
      title:
        en: "Essential storage"
        fr: "Stockage essentiel"
      description:
        en: "Smartphones with up to 128 GB of internal storage."
        fr: "Smartphones avec une capacité de stockage jusqu'à 128 Go."
    - id: "storage_large"
      group: "storage"
      criterias:
        - field: "attributes.indexed.STORAGE_CAPACITY.numericValue"
          operator: "GREATER_THAN"
          value: "128"
        - field: "attributes.indexed.STORAGE_CAPACITY.numericValue"
          operator: "LOWER_THAN_OR_EQUAL"
          value: "256"
      image: "example-image.png"
      url:
        en: "smartphones-128-256gb"
        fr: "smartphones-128-256go"
      caption:
        en: "128 - 256 GB"
        fr: "128 - 256 Go"
      title:
        en: "Large storage"
        fr: "Stockage confortable"
      description:
        en: "Smartphones with more than 128 GB and up to 256 GB of internal storage."
        fr: "Smartphones avec plus de 128 Go et jusqu'à 256 Go de stockage."
    - id: "storage_xl"
      group: "storage"
      criterias:
        - field: "attributes.indexed.STORAGE_CAPACITY.numericValue"
          operator: "GREATER_THAN"
          value: "256"
      image: "example-image.png"
      url:
        en: "smartphones-over-256gb"
        fr: "smartphones-plus-256go"
      caption:
        en: "> 256 GB"
        fr: "> 256 Go"
      title:
        en: "Very large storage"
        fr: "Très grand stockage"
      description:
        en: "Smartphones with more than 256 GB of internal storage."
        fr: "Smartphones avec plus de 256 Go de stockage."

