# Impact score configuration for the smartphones vertical.
# Weights grounded in:
#   [S1] Décret n°2021-219 (France, 2021-02-27) — indice de réparabilité obligatoire smartphones
#   [S2] Reg. (EU) 2023/1669 — energy labelling of smartphones/tablets (in force 2025-06-20)
#   [S3] ADEME "Empreinte carbone d'un smartphone" (2021) — manufacturing ~80% of lifecycle GHG
#   [S4] Commission Recommendation (EU) 2021/2279 — Environmental Footprint methods (PEF)
criteriasPonderation:
  REPAIRABILITY_INDEX: 0.3750  # [S1][S3] French law mandate; best coverage (1 983 hits); extends device lifespan
  DATA_QUALITY: 0.2500         # [S4] Virtualisation compensation; penalises incomplete product sheets
  WARRANTY: 0.1875             # [S3] Durability proxy; 4 691 hits; contractual confidence signal
  CLASSE_ENERGY: 0.1250        # [S2] EU Reg. 2023/1669; 589 hits; use-phase energy signal
  WEIGHT: 0.0625               # [S3] Material-intensity proxy; narrow range (100-400 g) -> secondary
