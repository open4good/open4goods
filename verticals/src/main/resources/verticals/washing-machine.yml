# DATAVIZ CONFIGURATION
####################################################################################
dataviz:
  chartOverrides:
    capacity-distribution:
      title: "Répartition des capacités de lavage"
      description: "Découvrez les capacités les plus populaires"
  heroKpis:
    - field: "attributes.indexed.WASHING_CAPACITY"
      label: "Capacité moyenne"
      unit: "kg"
      aggregation: "avg"
    - field: "scores.ECOSCORE.value"
      label: "Eco-score moyen"
      aggregation: "avg"

####################################################################################
# ATTRIBUTES CONFIGURATION
####################################################################################
attributesConfig:
  ###################################################################################################################
  # ATTRIBUTES MAPPINGS
  # Those attributes will be availlable for all products if one is found.
  # The line after configs: will be updated with the attribtes suggestion API, with commented attributes
  ##################################################################################################################
  configs:
    - key: CLASSE_ENERGY
    - key: INSTALLATION_TYPE
    - key: WASHING_CAPACITY
    - key: SPIN_SPEED
    - key: SPIN_CLASS
    - key: ENERGY_CONSUMPTION_100_CYCLES
    - key: ENERGY_CONSUMPTION_PER_CYCLE
    - key: WATER_CONSUMPTION
    - key: NOISE_LEVEL
    - key: NOISE_CLASS
    - key: PROGRAM_COUNT
    - key: REPAIRABILITY_INDEX
    - key: WARRANTY
    - key: "BRAND_SUSTAINALYTICS_SCORING"
    - key: HEIGHT
    - key: WIDTH
    - key: DEPTH
