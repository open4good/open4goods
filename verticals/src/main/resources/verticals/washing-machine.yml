nudgeToolConfig:
  subsetGroups:
    - id: "price"
      mdiIcon: "mdi-currency-eur"
      layout: "grid"
      title:
        en: "Budget"
        fr: "Budget"
      description:
        en: "Pick a price range."
        fr: "Votre budget"
      ctaLabel:
        en: "Continue"
        fr: "Continuer"
    - id: "capacity"
      mdiIcon: "mdi-washing-machine"
      layout: "grid"
      title:
        en: "Capacity"
        fr: "Capacité"
      description:
        en: "Choose capacity based on your household."
        fr: "Choisissez la capacité adaptée à votre foyer."
      ctaLabel:
        en: "Continue"
        fr: "Continuer"

  subsets:
    ################
    # Impact Score
    ################
    - id: "impact_high" # Worst 33% (high environmental impact)
      group: "impactscore"
      criterias:
        - field: "scores.ECOSCORE.ranking"
          fromPercent: 0
          toPercent: 33
      image: "example-image.png"
      url:
        en: "high-impact"
        fr: "fort-impact"
      caption:
        en: "High"
        fr: "Élevé"
      title:
        en: "High Impact"
        fr: "Impact Élevé"
      description:
        en: "Products with a high environmental impact"
        fr: "Produits ayant un fort impact environnemental"

    - id: "impact_medium" # Middle 34%
      group: "impactscore"
      criterias:
        - field: "scores.ECOSCORE.ranking"
          fromPercent: 33
          toPercent: 67
      image: "example-image.png"
      url:
        en: "medium-impact"
        fr: "impact-moyen"
      caption:
        en: "Medium"
        fr: "Moyen"
      title:
        en: "Medium Impact"
        fr: "Impact Moyen"
      description:
        en: "Products with a medium environmental impact"
        fr: "Produits ayant un impact environnemental moyen"

    - id: "impact_low" # Best 33% (low environmental impact)
      group: "impactscore"
      criterias:
        - field: "scores.ECOSCORE.ranking"
          fromPercent: 67
          toPercent: 100
      image: "example-image.png"
      url:
        en: "low-impact"
        fr: "faible-impact"
      caption:
        en: "Low"
        fr: "Faible"
      title:
        en: "Low Impact"
        fr: "Impact Faible"
      description:
        en: "Products with a low environmental impact"
        fr: "Produits ayant un faible impact environnemental"

    ################
    # Price
    ################
    - id: "price_budget"
      group: "price"
      criterias:
        - field: "price.minPrice.price"
          operator: "LOWER_THAN"
          value: "400"
      image: "example-image.png"
      url:
        en: "budget"
        fr: "petit-budget"
      caption:
        en: "< 400 €"
        fr: "< 400 €"
      title:
        en: "Budget Friendly"
        fr: "Petit Budget"
      description:
        en: "Washing machines under 400€."
        fr: "Lave-linges à moins de 400€."

    - id: "price_mid"
      group: "price"
      criterias:
        - field: "price.minPrice.price"
          operator: "GREATER_THAN"
          value: "400"
        - field: "price.minPrice.price"
          operator: "LOWER_THAN"
          value: "700"
      image: "example-image.png"
      url:
        en: "mid-range"
        fr: "milieu-de-gamme"
      caption:
        en: "400 - 700 €"
        fr: "400 - 700 €"
      title:
        en: "Best Value"
        fr: "Moyen de gamme"
      description:
        en: "Great balance of features and price."
        fr: "Bon équilibre entre fonctionnalités et prix."

    - id: "price_premium"
      group: "price"
      criterias:
        - field: "price.minPrice.price"
          operator: "GREATER_THAN"
          value: "700"
      image: "example-image.png"
      url:
        en: "premium"
        fr: "premium"
      caption:
        en: "> 700 €"
        fr: "> 700 €"
      title:
        en: "Premium"
        fr: "Haut de gamme"
      description:
        en: "Top of the line models."
        fr: "Les modèles les plus performants."

    ################
    # Capacity
    ################
    - id: "capacity_small"
      group: "capacity"
      criterias:
        - field: "attributes.indexed.WASHING_CAPACITY.numericValue"
          operator: "LOWER_THAN"
          value: "8"
      image: "small-capacity.png"
      url:
        en: "small-capacity"
        fr: "petite-capacite"
      caption:
        en: "< 8 kg"
        fr: "< 8 kg"
      title:
        en: "Small Capacity"
        fr: "Petite Capacité"
      description:
        en: "Ideal for couples or small apartments."
        fr: "Idéal pour couples ou petits appartements."

    - id: "capacity_medium"
      group: "capacity"
      criterias:
        - field: "attributes.indexed.WASHING_CAPACITY.numericValue"
          operator: "GREATER_THAN"
          value: "8"
        - field: "attributes.indexed.WASHING_CAPACITY.numericValue"
          operator: "LOWER_THAN"
          value: "10"
      image: "medium-capacity.png"
      url:
        en: "medium-capacity"
        fr: "capacite-moyenne"
      caption:
        en: "8 - 10 kg"
        fr: "8 - 10 kg"
      title:
        en: "Standard Family"
        fr: "Famille Standard"
      description:
        en: "Perfect for families of 3-4."
        fr: "Parfait pour les familles de 3-4 personnes."

    - id: "capacity_large"
      group: "capacity"
      criterias:
        - field: "attributes.indexed.WASHING_CAPACITY.numericValue"
          operator: "GREATER_THAN"
          value: "10"
      image: "large-capacity.png"
      url:
        en: "large-capacity"
        fr: "grande-capacite"
      caption:
        en: "> 10 kg"
        fr: "> 10 kg"
      title:
        en: "Large Capacity"
        fr: "Grande Capacité"
      description:
        en: "For large families."
        fr: "Pour les grandes familles."

