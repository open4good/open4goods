####################################################################################################################################################################
#
# This is the configuration for the WASHING-MACHINES vertical.
# Generated on the vertical.yml template file, using the VerticalsGenerationService.verticalTemplate()
# @See open4goods/commons/src/main/java/org/open4goods/config/yml/ui/VerticalConfig.java for commented POJO definition
###################################################################################################################################################################

# Unique identifier for this vertical.
# MUST contains only charracters
# SHOULD be equal to the configuration file name, without the extension
id: washing-machine
# Average daily usage time for a washing machine in hours.
# Based on typical household usage: 1 cycle of ~1h every 2 days = 0.5h/day average.
# Used for calculating annual energy costs and environmental impact.
averageHoursPerDay: 0.5

parsers:
  weight:
    minKg: 30.0
    maxKg: 150.0
  warranty:
    minYears: 0.0
    maxYears: 10.0

# The associated google taxonomyID. (Ex : FR - https://www.google.com/basepages/producttype/taxonomy-with-ids.fr-FR.txt)
# SHOULD be set, it will then force this taxonomy for all products in this vertical
googleTaxonomyId: 2549
eprelGroupNames:
  - "washingmachines2019"
  - "washingmachines"

verticalImage: /images/verticals/washing-machines.png

mdiIcon: mdi-washing-machine

# Indicates if the vertical must be UI / sitemap / search rendered
enabled: true
popular: true

availableImpactScoreCriterias:
  # Core energy efficiency metrics
  - CLASSE_ENERGY
  - POWER_CONSUMPTION_OFF
  - POWER_CONSUMPTION_TYPICAL
  # Resources
  - WATER_CONSUMPTION
  - WEIGHT
  # Durability and repairability
  - REPAIRABILITY_INDEX
  - WARRANTY
  # Brand and data quality
  - DATA_QUALITY
  - BRAND_SUSTAINALYTICS_SCORING
  - NOISE_LEVEL

popularAttributes:
  - WASHING_CAPACITY
  - LOADING_TYPE
  - SPIN_SPEED
  - NOISE_LEVEL

# GenAiConfig for this vertical
genAiConfig:
  # If false, will bypass the generativ ia texts generation
  enabled: true

#####################################################################################################################################
# I18N CONFIGURATION
# Configure in a i18n way all the texts of a product, including the Url, the title, the description, the open graph metas, ....
# Use a micro templated language, that allows to introduce variables and "if condition", which allows to generate dynamic texts
######################################################################################################################################
i18n:
  fr:
    # The layout a product url will have. Ex : 81234555-tv-led-samsung-QL659P 2023
    url:
      # We can add a custom prefix (with our conditional templating language if we want)
      prefix: "|| lave-linge | machine-a-laver ||"
      # Then we add some attributes values with hyphens if present (ex : led-samsung-QL659P-2023)
      attrs:
        - BRAND
        - MODEL
    ##################################
    # Product page meta and h1 title
    ##################################
    # The product h1 title. Constructed on the same basis than "url", but without the concatened hyphens
    h1Title:
      prefix: "|| Lave-linge | Machine à laver ||"
      attrs:
        - BRAND
        - MODEL
        - YEAR
    singular:
      prefix: "|| lave-linge | machine à laver ||"
      attrs: []
    singularDesignation:
      prefix: "|| du lave-linge | de ce lave-linge | de la machine à laver | de cette machine | de cet appareil ||"
      attrs: []
    designation:
      - "du lave-linge"
      - "de ce lave-linge"
      - "de la machine à laver"
      - "de cette machine"
      - "de cet appareil"
    cardTitle: "{BRAND} {MODEL}"
    shortName: "{BRAND} {MODEL}"
    longName: "{BRAND} {MODEL} - {WASHING_CAPACITY} {SPIN_SPEED}"

    ##################################
    # Vertical page elements
    ##################################

    # url for vertical (appened to baseUrl). No templating here
    verticalHomeUrl: "lave-linges"
    # Text displaid as title for the vertical
    # TODO : Make verticalHomeTitle/ verticalHomeDescription templatable
    verticalHomeTitle: "Machines à laver"
    # Text displaid as jumbotron for the vertical
    verticalHomeDescription: "Découvrez notre sélection de machines à laver. Entre consommation d’eau, d’énergie et durabilité, ces appareils ont un vrai impact sur l’environnement. Nudger vous accompagne pour trouver le modèle le plus responsable, tout en répondant parfaitement à vos besoins du quotidien."

    # A mapping beetween custom page names behind this vertical and wiki pages
    # Copy and paste the wiki wiew url, without the "bin/view" prefix
  #      wikiPages:
  #        - wikiUrl: /verticals/tv/technologies-tv/WebHome
  #          verticalUrl: "oled-qled-lcd-que-choisir"
  #          title: "OLED, QLED,LCD, ... Quelle technologie choisir ?"
  #          faIcon: "fa-star"
  en:
    # The layout a product url will have. Ex : 81234555-washing-machine-samsung-QL659P-2023
    url:
      # We can add a custom prefix (with our conditional templating language if we want)
      prefix: "|| washing machine | washer ||"
      # Then we add some attributes values with hyphens if present (ex : samsung-QL659P-2023)
      attrs:
        - BRAND
        - MODEL
        - YEAR
    ##################################
    # Product page meta and h1 title
    ##################################
    # The product h1 title. Constructed on the same basis than "url", but without the concatened hyphens
    h1Title:
      prefix: "|| Washing machine | Washer ||"
      attrs:
        - BRAND
        - MODEL
        - YEAR
    singular:
      prefix: "|| washing machine | washer ||"
      attrs: []
    singularDesignation:
      prefix: "|| of the washing machine | of this washing machine | of the washer | of this washer | of the appliance ||"
      attrs: []
    designation:
      - "of the washing machine"
      - "of this washing machine"
      - "of the washer"
      - "of this washer"
      - "of the appliance"

    # Product metas (generic templates reused)
    productMetaTitle: "[(${p.brand()})] [(${p.model()})] : Eco-score, ecological offset and best prices"
    productMetaDescription: "[(${p.brand()})] [(${p.model()})] : Eco-score, || ecological | environmental || offset and best prices."
    productMetaOpenGraphTitle: "[(${p.brand()})] - [(${p.model()})] : Ecoscore [(${p.ecoscore()})]."
    productMetaOpenGraphDescription: "[(${p.brand()})] [(${p.model()})] : Eco-score, || ecological | environmental || offset and best prices."
    productMetaOpenGraphType: "product"

    ##################################
    # Vertical page elements
    ##################################

    # url for vertical (appened to baseUrl). No templating here
    verticalHomeUrl: "washing-machines"
    # Text displaid as title for the vertical
    # TODO : Make verticalHomeTitle/ verticalHomeDescription templatable
    verticalHomeTitle: "Washing machines"
    # Text displaid as jumbotron for the vertical
    verticalHomeDescription: "Explore our selection of washing machines. Water and energy use, noise levels, and durability all matter for environmental impact. Nudger helps you choose the most responsible model that still matches your daily needs."

##############################################################################
# Custom search filters : the following filters
# will also be availlable in search for this vertical (must be an attribute or a score)
##############################################################################

aggregationConfiguration:
