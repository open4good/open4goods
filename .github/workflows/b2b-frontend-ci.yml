name: B2B Frontend CI

on:
  push:
    paths:
      - "b2b-frontend/**"
    branches: [main]
  pull_request:
    paths:
      - "b2b-frontend/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          version: 11.8.0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
          cache-dependency-path: b2b-frontend/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: b2b-frontend

      - name: Lint
        run: pnpm lint
        working-directory: b2b-frontend

      - name: Typecheck
        run: pnpm typecheck
        working-directory: b2b-frontend

      - name: Test
        run: pnpm test
        working-directory: b2b-frontend

      - name: Build
        run: pnpm build
        working-directory: b2b-frontend
