on:
  push:
    branches:
      - "main"
    paths-ignore:
      - "frontend/**"

name: 🔘 Beta - Build, Test, and Publish
run-name: 🔘 Beta Build by @${{ github.actor }}

jobs:
  deploy:
    name: Beta Test, Build, and Publish
    runs-on: self-hosted
    concurrency:
      group: deploy-beta
      cancel-in-progress: true

    steps:
      ############################################
      # 1. Checkout the Main Repository
      ############################################
      - name: Checkout Repository
        uses: actions/checkout@v6

      ############################################
      # 2. Set up JDK 21 (avec cache Maven intégré)
      ############################################
      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: "temurin"
          java-version: "25"
          cache: "maven"

      ############################################
      # 3. Set up Maven Repositories
      ############################################
      - name: Set up Maven Repositories
        uses: s4u/maven-settings-action@v4.0.0
        with:
          repositories: |
            [
              {
                "id": "xwiki-releases",
                "name": "xwiki-releases",
                "url": "https://maven.xwiki.org/releases/",
                "snapshots": {
                  "enabled": false
                }
              }
            ]

      ############################################
      # 4. Maven Dependency Tree Submission
      ############################################
      #  - name: Maven Dependency Submission
      #    uses: advanced-security/maven-dependency-submission-action@v5.0.0

      ############################################
      # 5. Build and Test with Maven
      ############################################
      - name: Build and Test with Maven
        run: mvn --batch-mode --update-snapshots install

      ############################################
      # 5b. Bundle markdown/prompt resources into classpath JARs
      ############################################
      - name: Bundle markdown/prompt resources
        uses: ./.github/actions/bundle-doc-resources
        with:
          jar-paths: |
            admin/target/admin-0.0.1-SNAPSHOT.jar
            api/target/api-0.0.1-SNAPSHOT.jar
            ui/target/ui-0.0.1-SNAPSHOT.jar
            front-api/target/front-api-0.0.1-SNAPSHOT.jar

      ############################################
      # 6. Deploy JAR Files to Qualification Environment
      ############################################
      - name: 📦 Gather JARs for Deployment
        run: |
          mkdir -p deploy-jars
          cp admin/target/admin-0.0.1-SNAPSHOT.jar deploy-jars/sbadmin-latest.jar
          cp api/target/api-0.0.1-SNAPSHOT.jar deploy-jars/api-latest.jar
          cp ui/target/ui-0.0.1-SNAPSHOT.jar deploy-jars/ui-latest.jar
          cp front-api/target/front-api-0.0.1-SNAPSHOT.jar deploy-jars/front-api-latest.jar
          cp b2b-api/target/b2b-api-0.0.1-SNAPSHOT.jar deploy-jars/b2b-api-latest.jar

      - name: 🚚 Deploy JARs to Qualification Server (Consolidated)
        uses: easingthemes/ssh-deploy@main
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          ARGS: "-rltgoDzvO"
          SOURCE: "deploy-jars/"
          REMOTE_HOST: ${{ secrets.REMOTE_BETA_HOST }}
          REMOTE_USER: ${{ secrets.REMOTE_BETA_USER }}
          TARGET: "/opt/open4goods/latest/"

      ############################################
      # 7a. Build b2b-frontend
      ############################################
      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11.7.0

      - name: Set up Node.js for b2b-frontend
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "pnpm"
          cache-dependency-path: b2b-frontend/pnpm-lock.yaml

      - name: Install b2b-frontend dependencies
        run: pnpm install --frozen-lockfile
        working-directory: b2b-frontend

      - name: Build b2b-frontend
        run: pnpm build
        working-directory: b2b-frontend
        env:
          NUXT_PUBLIC_BACKEND_BASE_URL: https://beta.api.product-data-api.com
          NUXT_BACKEND_PROXY_TARGET: http://localhost:8087

      - name: Deploy b2b-frontend output to beta server
        uses: easingthemes/ssh-deploy@main
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          ARGS: "-rltgoDzvO --delete"
          SOURCE: "b2b-frontend/.output"
          REMOTE_HOST: ${{ secrets.REMOTE_BETA_HOST }}
          REMOTE_USER: ${{ secrets.REMOTE_BETA_USER }}
          TARGET: "/opt/open4goods/latest/b2b-frontend"

      ############################################
      # 7b. Publish b2b-frontend container
      ############################################
      - name: Publish b2b-frontend
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.REMOTE_BETA_HOST }}
          username: ${{ secrets.REMOTE_BETA_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: sh /opt/open4goods/bin/publish-b2b-frontend.sh beta

      ############################################
      # 7c. Restarting Spring Applications
      ############################################
      - name: Publish Applications
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.REMOTE_BETA_HOST }}
          username: ${{ secrets.REMOTE_BETA_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: sh /opt/open4goods/bin/publish-jars.sh beta
