services:
####################################################################
# Elastic Search
###################################################################

  elastic:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.15.0
    container_name: elastic
    environment:
      - http.max_content_length=200mb
      - node.name=elastic
      - cluster.name=es-docker-cluster
      - cluster.initial_master_nodes=elastic
      - bootstrap.memory_lock=true
      - "ES_JAVA_OPTS=-Xms256m -Xmx256m"
      - xpack.security.enabled=false
      
    ulimits:
      memlock:
        soft: -1
        hard: -1    
      nproc: 65536
      nofile:
        soft: 65536
        hard: 65536

#    volumes:
#      - /tmp/elastic-data:/usr/share/elasticsearch/data

    ports:
      - "9200:9200"
    networks:
      - o4g-network

####################################################################
# Redis
###################################################################

  redis:
    image: bitnami/redis:7.4.0
    container_name: redis
    command: ["redis-server", "--stop-writes-on-bgsave-error","no","--protected-mode","no", "--appendonly", "no", "--maxmemory", "20mb", "--maxmemory-policy", "allkeys-lru"]
    ports:
      - 6379:6379        
    environment:
      - ALLOW_EMPTY_PASSWORD=yes
 
    networks:
      - o4g-network
      
####################################################################
# MongoDB
###################################################################

  mongo:
    image: mongo:6.0.5
    container_name: mongo
    environment:
        - MONGO_INITDB_ROOT_USERNAME=nudger
        - MONGO_INITDB_ROOT_PASSWORD=nudger
        - MONGO_INITDB_DATABASE=products
    volumes:
      - /opt/open4goods/mongo/db:/data/db
      - /opt/open4goods/mongo/configdb:/data/configdb
#      - mongo-data:/data/db
#      - mongo-config:/data/configdb
      - ./mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro      
    ports:
      - "27017:27017"
    networks:
      - o4g-network
    deploy:
      resources:
        limits:
          memory: 2048M
          cpus: "4.0"
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
        window: 120s

