###############################################
# Fun facts displayed in UI banners
# Bound to: UiConfig.funFacts (Localisable<String, FunFactsConfig>, key "fun-facts")
###############################################
fun-facts:
  fr:
    facts:
      - title: "La biodiversite, c'est vital"
        description: "La biodiversite maintient l'equilibre des ecosystemes et assure la survie de milliers d'especes."
      - title: "Les forets purifient l'air"
        description: "Les arbres absorbent le CO2 et produisent de l'oxygene, jouant un role essentiel dans la lutte contre le changement climatique."
      - title: "L'energie solaire, une ressource illimitee"
        description: "Le soleil fournit plus d'energie en une heure que l'humanite n'en consomme en une annee."
      - title: "La reduction des dechets plastiques"
        description: "Recycler et diminuer l'usage du plastique est crucial pour proteger les oceans et la vie marine."
      - title: "Les toits verts"
        description: "Les toits vegetalises ameliorent l'isolation thermique et reduisent l'effet d'ilot de chaleur en ville."
      - title: "Les abeilles, gardiennes de la pollinisation"
        description: "Les abeilles sont indispensables a la pollinisation, soutenant la production alimentaire mondiale."
      - title: "L'eau, source de vie"
        description: "La gestion durable de l'eau est essentielle pour preserver les ecosystemes et garantir l'avenir."
      - title: "Les energies renouvelables"
        description: "L'eolien, le solaire et l'hydroelectrique offrent des alternatives propres aux energies fossiles."
      - title: "Les zones humides, poumons de la Terre"
        description: "Les zones humides filtrent l'eau, prevalent les inondations et abritent une biodiversite riche."
      - title: "Les oceans, regulateurs climatiques"
        description: "Les oceans absorbent le CO2 et moderent les temperatures globales, agissant comme un thermostat naturel."
      - title: "Le compostage, un geste ecologique"
        description: "Transformer les dechets organiques en compost enrichit le sol et reduit la quantite de dechets."
      - title: "La mobilite douce"
        description: "Favoriser la marche, le velo et les transports en commun aide a reduire les emissions de gaz a effet de serre."
      - title: "Les circuits courts"
        description: "Acheter localement diminue l'empreinte carbone liee au transport des produits et soutient l'economie locale."
      - title: "La permaculture, agriculture durable"
        description: "La permaculture imite les processus naturels pour creer des systemes agricoles resilients et durables."
      - title: "Les micro-habitats urbains"
        description: "Meme en ville, de petits espaces peuvent devenir des refuges pour la biodiversite locale."
      - title: "Les emballages ecologiques"
        description: "Utiliser des emballages biodegradables aide a reduire la pollution et facilite le recyclage."
      - title: "La reduction des emissions de CO2"
        description: "Des gestes quotidiens simples, comme eteindre la lumiere inutilement, contribuent a diminuer l'empreinte carbone."
      - title: "Les zones protegees"
        description: "Les parcs nationaux et reserves naturelles preservent des habitats uniques et soutiennent la biodiversite."
      - title: "L'education environnementale"
        description: "Sensibiliser des le plus jeune age aux enjeux ecologiques est essentiel pour un avenir durable."
      - title: "L'agriculture biologique"
        description: "L'agriculture biologique favorise la sante des sols et limite l'utilisation de produits chimiques nocifs."

