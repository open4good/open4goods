####################################################################
# open4goods -- UI module -- Default configuration
#
# All keys here are shared across every environment (dev, beta, prod).
# Secrets and per-environment overrides live in the profile-specific
# files (application-devsec.yml, configs/*/ui/application-active.yml).
####################################################################

###############################################
# Server
###############################################
server:
  # Enable HTTP response compression for common MIME types.
  compression:
    enabled: true
    mime-types: text/html,text/xml,text/plain,text/css,text/javascript,application/javascript,application/json
    min-response-size: 1024
  # Enable HTTP/2 support.
  http2:
    enabled: true
  # Trust X-Forwarded-* headers sent by the upstream reverse-proxy.
  forward-headers-strategy: NATIVE

###############################################
# Spring Boot Actuator
###############################################
management:
  health:
    diskspace:
      # Alert threshold for the disk-space health indicator.
      threshold: 100GB
  endpoints:
    web:
      exposure:
        # Expose all actuator endpoints (restrict in prod via firewall).
        include: "*"
  endpoint:
    health:
      enabled: true
      show-details: always

###############################################
# Spring Framework
###############################################
spring:
  # Spring AI — OpenAI backend used for text generation.
  ai:
    openai:
      chat:
        options:
          model: gpt-4o-mini
          temperature: 1.0
          response-format:
            type: JSON_OBJECT

  # Use virtual threads (Java 21 Loom) for all blocking work.
  threads:
    virtual:
      enabled: true

  # Spring Mail defaults — host/credentials are set per environment.
  mail:
    port: 587
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true

  # i18n message bundles.
  messages:
    basename: i18n/messages

  # Application name (shown in Spring Boot Admin).
  application:
    name: open4goods-ui

  # Thymeleaf — caching is disabled by default (dev); enabled in prod.
  thymeleaf:
    cache: true

  # Enable Spring Data Elasticsearch repositories.
  data:
    elasticsearch:
      repositories:
        enabled: true

###############################################
# Amazon affiliate links
# Bound to: UiConfig.amazonConfig (AmazonConfig)
###############################################
amazon-config:
  # Affiliate tag appended to every Amazon URL.
  affiliate-tag: nudger-21
  # Template for Amazon product search URLs ({search_terms} and {affiliate_tag} are replaced).
  amazon-search-link: "https://www.amazon.fr/s?k={search_terms}&tag={affiliate_tag}"

###############################################
# Image resizing (ImageResizeInterceptor)
# Bound to: UiConfig.allowedImagesSizeSuffixes / UiConfig.imageBaseUrl
###############################################
# Allowed pixel-width suffixes for on-the-fly image resizing.
allowed-images-size-suffixes:
  - 30
  - 50
  - 100
  - 360
  - 1000

# Base URL from which source images are fetched before resizing.
image-base-url: https://static.nudger.fr

###############################################
# Google product taxonomy
# Bound to: UiConfig.googleTaxonomy (Map<String, String>)
###############################################
google-taxonomy:
  fr: https://www.google.com/basepages/producttype/taxonomy-with-ids.fr-FR.txt
  en: https://www.google.com/basepages/producttype/taxonomy-with-ids.en-US.txt

###############################################
# Remote file caching
# Bound to: RemoteFileCachingProperties (prefix="remote-file-caching")
###############################################
remote-file-caching:
  # HTTP connection timeout in milliseconds.
  connection-timeout: 30000
  # HTTP read timeout in milliseconds.
  read-timeout: 30000

###############################################
# XWiki wiki pages → URL mapping
# Bound to: UiConfig.wikiPagesMapping (Map<String, Localisable<String,String>>)
###############################################
wiki-pages-mapping:
  "[webpages/default/legal-notice/WebHome]":
    fr: "mentions-legales"
  "[webpages/default/data-privacy/WebHome]":
    fr: "politique-confidentialite"

