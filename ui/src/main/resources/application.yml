  feed-title:
    default: "The Nudger blog"
    fr: "Le blog Nudger"
  feed-description:
    default: "The Nudger blog, the best way to keep up with the latest news about eco-nudging"
    fr: "Le blog Nudger, la meilleure facon de suivre les dernieres actualites sur l'eco-nudging"

###############################################
# Open data export service
# Bound to: OpenDataConfig (prefix="open-data-config")
###############################################
open-data-config:
  # Max download speed per client connection in kilobytes per second.
  download-speed-kb: 256
  # Maximum parallel downloads allowed.
  concurrent-downloads: 4
  # Set to true to enable scheduled file generation (disabled by default in dev).
  generation-enabled: true

###############################################
# GitHub feedback integration
# Bound to: FeedbackConfiguration (prefix="feedback")
###############################################
feedback:
  github:
    # GitHub personal access token — must be overridden in devsec/prod configs.
    access-token: GITHUB_ACCESS_TOKEN
    organization: open4good
    repo: open4goods
    user: GoulvenF

