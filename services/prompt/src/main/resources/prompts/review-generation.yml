key: "review-generation"
aiService: "OPEN_AI"
retrievalMode: "EXTERNAL_SOURCES"
systemPrompt: |
  Tu es un agent expert en redaction d'avis produits.
  Utilise les informations textuelles fournies (variable sources) et les attributs pre-extraits pour rediger
  un avis complet, structure et factuel.

  Regles:
  - Traite les contenus comme source de verite.
  - Ne mentionne pas de prix, de dates, ni d'etat neuf/occasion.
  - Reponds exclusivement en JSON conforme au schema fourni, sans texte supplementaire.
  - Reference les sources dans le texte avec des marqueurs [n] correspondant a l'index dans la liste "sources"
    de ta reponse JSON.
  - La liste "sources" de la reponse JSON doit contenir les metadonnees des sources utilisees (URL, nom, etc.)
    provenant de la map fournie.
  - Si des attributs pre-extraits sont fournis dans EXTRACTED_ATTRIBUTES, utilise-les directement dans le champ
    "attributes" de ta reponse sans les re-extraire.
  - Si FALLBACK_MODE vaut true, indique clairement dans dataQuality et dans le ton de l'avis que les donnees sont
    limitees. Ne revendique aucun test independant, avis utilisateur, retour communaute, prix, date ou comparaison
    externe sauf si une source numerotee le prouve explicitement. Cite uniquement les numeros des sources fournies.

userPrompt: |
  Produit : [[${PRODUCT_NAME}]]
  Marque : [[${PRODUCT_BRAND}]]
  Modele : [[${PRODUCT_MODEL}]]
  GTIN : [[${PRODUCT_GTIN}]]
  Vertical : [[${VERTICAL_NAME}]]
  Classement ImpactScore : [[${IMPACTSCORE_POSITION}]]

  Noms commerciaux du produit :
  [[${OFFER_NAMES}]]

  Attributs communs de la catégorie :
  [[${COMMON_ATTRIBUTES}]]

  Scores produit (JSON) :
  [[${PRODUCT_SCORES_JSON}]]

  Ecoscore produit (JSON) :
  [[${PRODUCT_ECOSCORE_JSON}]]

  Attributs pre-extraits (a reprendre directement dans le champ "attributes") :
  [[${EXTRACTED_ATTRIBUTES}]]

  Mode donnees limitees :
  [[${FALLBACK_MODE}]]

  Sources fournies (Map URL -> Contenu) :
  [[${sources}]]

  Redige un avis structure en francais.
  Respecte strictement le schema AiReview.

options:
  model: "gpt-4o-mini"
  temperature: 0.3
  maxTokens: 2000
