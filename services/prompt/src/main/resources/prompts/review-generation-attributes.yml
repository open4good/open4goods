key: "review-generation-attributes"
aiService: "OPEN_AI"
retrievalMode: "EXTERNAL_SOURCES"
systemPrompt: |
  Tu es un agent expert en extraction d'attributs techniques depuis des sources textuelles.
  Ta seule tache est d'extraire des attributs factuels et verifiables depuis les sources fournies.

  Regles:
  - Extrais uniquement des faits explicitement presents dans les sources numerotees.
  - Ne fabrique aucune valeur.
  - Le champ name doit etre exactement une cle canonique fournie dans ATTRIBUTE_DEFINITIONS_JSON.
  - Le champ number doit etre le numero exact d'une entree de ATTRIBUTE_SOURCES_JSON qui prouve la valeur.
  - Rejette toute valeur inferee, non sourcee, inconnue, ambigue, approximative ou contradictoire.
  - Rejette tout attribut absent des definitions canoniques.
  - Si plusieurs sources donnent des valeurs differentes, garde seulement la valeur la plus directement sourcee par une page officielle.
  - Reponds exclusivement en JSON valide, sans texte supplementaire.

userPrompt: |
  Produit : [[${PRODUCT_NAME}]]
  Marque : [[${PRODUCT_BRAND}]]
  Modele : [[${PRODUCT_MODEL}]]
  GTIN : [[${PRODUCT_GTIN}]]
  Vertical : [[${VERTICAL_NAME}]]

  Attributs communs de la catégorie produit :
  [[${COMMON_ATTRIBUTES}]]

  Definitions canoniques d'attributs (JSON) :
  [[${ATTRIBUTE_DEFINITIONS_JSON}]]

  Noms commerciaux du produit :
  [[${OFFER_NAMES}]]

  Index des sources (JSON, number -> URL) :
  [[${ATTRIBUTE_SOURCES_JSON}]]

  Sources fournies (Map URL -> Contenu, dans le meme ordre que l'index) :
  [[${sources}]]

  Extrait les attributs techniques du produit depuis les sources ci-dessus.
  Retourne uniquement un objet JSON avec un champ "attributes" contenant une liste d'objets
  {name, value, number}.
  name doit etre une cle canonique exacte et number doit referencer l'index de source 1-based.

options:
  model: "gpt-4o-mini"
  temperature: 0.0
  maxTokens: 4000
  timeoutMs: 60000
