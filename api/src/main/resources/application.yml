server:
  port: ${SERVER_PORT:8086}
  compression:
    enabled: true
    mime-types: text/html,text/xml,text/plain,text/css,text/javascript,application/javascript,application/json
    min-response-size: 1024
  http2:
    enabled: true
  forward-headers-strategy: NATIVE

########################
# Logging configuration
########################
logging:
  level:
    org.apache.fontbox.ttf.PostScriptTable: ERROR
  file:
    max-history: 5
    max-size: 200MB

aggregationLogLevel: warn

api:
  backup:
    xwiki-backup-file: /opt/open4goods/backup/xwiki-backup.zip
    data-backup-folder: /opt/open4goods/backup/products
    import-product-path: /opt/open4goods/backup/import
    copy-page-size: 5000
    copy-bulk-size: 500
    copy-threads: 4
    copy-queue-size: 50

management:
  health:
    diskspace:
      threshold: 100GB
  endpoints:
    web:
      exposure:
        include:
          - "*"
  endpoint:
    health:
      enabled: true
      show-details: always

spring:
  profiles:
    default: local
  docker:
    compose:
      enabled: true
      file: ../docker-compose.yml
  servlet:
    multipart:
      max-file-size: -1
      max-request-size: -1
  jackson:
    default-property-inclusion: non-empty
  application:
    name: open4goods-api
  threads:
    virtual:
      enabled: true
  ai:
    openai:
      api-key: ${gen-ai-config.openai-api-key}
      chat:
        options:
          model: ${OPENAI_MODEL:gpt-4o-mini}
          temperature: 1.0
    #          response-format:
    #            type: JSON_OBJECT
    vertex:
      ai:
        gemini:
          project-id: ${gen-ai-config.vertex-project-id}
          location: ${gen-ai-config.vertex-location}
          api-key: ${gen-ai-config.vertex-api-key}

springdoc:
  swagger-ui:
    disable-swagger-default-url: true

genAiPauseDurationMs: 100

remote-file-caching:
  connection-timeout: 30000
  read-timeout: 30000

embedding:
  enabled: true
  provider: djl
  text-model-url: djl://ai.djl.huggingface.pytorch/intfloat/multilingual-e5-small
  vision-model-url: djl://ai.djl.pytorch/resnet18_embedding/0.0.1
  async-loading: true
  predictor-pool-size: ${EMBEDDING_PREDICTOR_POOL_SIZE:2}
  embedding-dimension: 512
  query-prefix: "query:"
  passage-prefix: "passage:"
  # Delegated OpenAI-compatible embedding computation sample.
  # Keep provider=djl for local inference. To delegate to LocalAI, switch provider
  # and configure the endpoint below.
  # provider: openai-compatible
  # openai:
  #   base-url: ${EMBEDDING_OPENAI_BASE_URL:http://localhost:8080/v1}
  #   api-key: ${EMBEDDING_OPENAI_API_KEY:localai}
  #   model: ${EMBEDDING_OPENAI_MODEL:text-embedding-model}
  #   timeout: 60s

review:
  generation:
    min-markdown-chars: ${REVIEW_GENERATION_MIN_MARKDOWN_CHARS:500}
    preferred-domains:
      - leclaireur.fnac.com
      - quechoisir.org
      - lcd-compare.com
      - lesnumeriques.com
