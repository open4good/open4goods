gen-ai-config:

feed:
  awin:
    cron: 0 43 1 * * ?
    enabled: true
    cache-ttl-days: 1
  effiliation:
    cron: 30 43 1 * * ?
    enabled: true
    cache-ttl-days: 1
    max-jitter-seconds: 30

---
spring:
  config:
    activate:
      on-profile: "default"
  boot:
    admin:
      client:
        enabled: false
